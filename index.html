<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şansını Dene - Betorspin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a000;
    --gold-light: #ffe066;
    --red: #c0200a;
    --dark: #0f0500;
    --dark2: #1e0c00;
    --dark3: #2d1400;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: radial-gradient(ellipse at top, #2d1400 0%, #0f0500 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Roboto', sans-serif;
    overflow-x: hidden;
    padding-bottom: 32px;
  }

  /* Particle bg */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  .header {
    position: relative;
    z-index: 2;
    margin-top: 24px;
    text-align: center;
  }
  .logo {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-shadow: 0 0 24px rgba(255,220,80,0.5);
    margin-bottom: 4px;
  }
  .logo span { color: #fff; }
  .tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title-wrap {
    position: relative;
    z-index: 2;
    margin-top: 20px;
    margin-bottom: 10px;
    text-align: center;
  }
  .main-title {
    font-family: 'Oswald', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,200,0,0.7), 0 2px 0 rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }
  .main-title span { color: var(--gold-light); }

  /* Wheel area */
  .wheel-area {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .outer-ring {
    position: relative;
    width: 310px;
    height: 310px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* LED ring */
  .outer-ring::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(
      #ffe066 0deg, #c8a000 30deg, #ffe066 60deg, #c8a000 90deg,
      #ffe066 120deg, #c8a000 150deg, #ffe066 180deg, #c8a000 210deg,
      #ffe066 240deg, #c8a000 270deg, #ffe066 300deg, #c8a000 330deg, #ffe066 360deg
    );
    animation: ring-spin 6s linear infinite;
    z-index: -1;
  }
  .outer-ring::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: #1e0c00;
    z-index: -1;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }

  /* Pointer */
  .pointer-wrap {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .pointer-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #ffe066, #c8a000);
    border: 2px solid rgba(255,255,255,0.4);
    margin-bottom: -2px;
  }
  .pointer-tri {
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 26px solid #c8a000;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6));
  }

  canvas#wheel { border-radius: 50%; display: block; }

  /* Spin button */
  .spin-btn {
    margin-top: 28px;
    position: relative;
    background: none;
    border: none;
    cursor: pointer;
    outline: none;
    z-index: 2;
  }
  .spin-btn-inner {
    background: linear-gradient(180deg, #e83020 0%, #9c1008 55%, #7a0a04 100%);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    border-radius: 50px;
    padding: 16px 72px;
    box-shadow: 0 5px 0 #4a0602, 0 8px 30px rgba(200,10,0,0.45);
    transition: transform 0.1s, box-shadow 0.1s;
    border: 1px solid rgba(255,100,80,0.3);
    position: relative;
    overflow: hidden;
  }
  .spin-btn-inner::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: rgba(255,255,255,0.08);
    border-radius: 50px 50px 0 0;
  }
  .spin-btn:active:not(:disabled) .spin-btn-inner {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #4a0602, 0 2px 10px rgba(200,10,0,0.3);
  }
  .spin-btn:disabled { cursor: not-allowed; }
  .spin-btn:disabled .spin-btn-inner { opacity: 0.5; }

  .spins-info {
    margin-top: 12px;
    position: relative;
    z-index: 2;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
  }
  .congrats-txt {
    margin-top: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(255,210,0,0.6);
    min-height: 40px;
    position: relative;
    z-index: 2;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Site butonu */
  .site-btn {
    margin-top: 20px;
    position: relative;
    z-index: 2;
    background: linear-gradient(135deg, #c8a000, #ffe066, #c8a000);
    background-size: 200% auto;
    color: #1a0800;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 40px;
    padding: 13px 40px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 4px 20px rgba(200,160,0,0.4);
    animation: shimmer 2.5s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }

  /* Result popup */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .result-card {
    background: linear-gradient(160deg, #2d1400, #0f0500);
    border: 2px solid var(--gold);
    border-radius: 24px;
    padding: 36px 36px 28px;
    text-align: center;
    width: 88%;
    max-width: 320px;
    box-shadow: 0 0 80px rgba(200,160,0,0.25), inset 0 1px 0 rgba(255,220,80,0.15);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .result-emoji { font-size: 54px; margin-bottom: 12px; line-height: 1; }
  .result-heading {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    color: var(--gold-light);
    margin-bottom: 8px;
    text-shadow: 0 0 12px rgba(255,210,0,0.5);
  }
  .result-sub { font-size: 15px; color: rgba(255,255,255,0.75); margin-bottom: 24px; line-height: 1.5; }
  .result-close {
    background: linear-gradient(180deg, #e83020, #9c1008);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 30px;
    padding: 13px 48px;
    cursor: pointer;
    box-shadow: 0 4px 0 #4a0602;
  }
  .confetti-burst { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="header">
  <div class="logo">betor<span>spin</span><span style="color:var(--gold)">.</span></div>
  <div class="tagline">Casino & Spor Bahisleri</div>
</div>

<div class="title-wrap">
  <div class="main-title">Şansını <span>Dene!</span></div>
</div>

<div class="wheel-area">
  <div class="outer-ring">
    <div class="pointer-wrap">
      <div class="pointer-circle"></div>
      <div class="pointer-tri"></div>
    </div>
    <canvas id="wheel" width="296" height="296"></canvas>
  </div>
</div>

<button class="spin-btn" id="spinBtn" onclick="spin()">
  <div class="spin-btn-inner">ÇEVİR</div>
</button>
<div class="spins-info" id="spinsInfo">1 Çevirme Hakkın Kaldı</div>
<div class="congrats-txt" id="congratsTxt"></div>
<a class="site-btn" id="siteBtn" href="https://cutt.ly/deoKNC0g" target="_blank">🔥 Hemen Oyna & Kazan</a>

<!-- Result popup -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-emoji" id="resEmoji">🎉</div>
    <div class="result-heading" id="resHeading">Tebrikler!</div>
    <div class="result-sub" id="resSub"></div>
    <button class="result-close" onclick="closePopup()">TAMAM</button>
  </div>
</div>
<canvas class="confetti-burst" id="confetti"></canvas>

<script>
// Telegram WebApp init
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f0500');
  tg.setBackgroundColor('#0f0500');
}

// Particles
const pContainer = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 5 + 2;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    animation-duration:${6+Math.random()*8}s;
    animation-delay:${Math.random()*8}s;
  `;
  pContainer.appendChild(p);
}

// Wheel segments
const SEGS = [
  { label: ['500 TL', 'BONUS'],   color: '#b89000', text: '#ffe599', icon: '🪙', win: true,  prize: '500 TL Bonus' },
  { label: ['100', 'FREESPIN'],   color: '#1a3a8a', text: '#ffe066', icon: '🏆', win: true,  prize: '100 Freespin' },
  { label: ['BÜYÜK', 'ÖDÜL'],     color: '#8a1515', text: '#ffe066', icon: '🥇', win: true,  prize: 'Büyük Ödül' },
  { label: ['KDÜL', ''],          color: '#7a1010', text: '#ffd0a0', icon: '🏅', win: true,  prize: 'Özel Ödül' },
  { label: ['10 TL', 'BELEŞ'],    color: '#7a1010', text: '#fff',    icon: '🎲', win: true,  prize: '10 TL Bedava' },
  { label: ['ÖZEL', 'ÖDÜL'],      color: '#8a1515', text: '#ffe066', icon: '🎁', win: true,  prize: 'Özel Ödül' },
  { label: ['500 TL', 'BONUS'],   color: '#b89000', text: '#ffe599', icon: '🪙', win: true,  prize: '500 TL Bonus' },
  { label: ['KAYBETTİN', 'Dene'], color: '#181818', text: '#888',    icon: '😐', win: false, prize: null },
  { label: ['ÖZEL', 'ANAHTAR'],   color: '#1a1a1a', text: '#c8a000', icon: '🔑', win: true,  prize: 'Özel Anahtar Ödülü' },
  { label: ['KAYBETTİN', 'Dene'], color: '#181818', text: '#888',    icon: '😐', win: false, prize: null },
  { label: ['10 TL', 'BELEŞ'],    color: '#7a1010', text: '#fff',    icon: '🎲', win: true,  prize: '10 TL Bedava' },
  { label: ['500 TL', 'BONUS'],   color: '#b89000', text: '#ffe599', icon: '🪙', win: true,  prize: '500 TL Bonus' },
];
const N = SEGS.length;
const ARC = (2 * Math.PI) / N;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const CX = 148, CY = 148, R = 140;
let angle = 0;
let spinning = false;
let spinsLeft = 1;

function drawWheel(a) {
  ctx.clearRect(0, 0, 296, 296);
  for (let i = 0; i < N; i++) {
    const s = a + i * ARC;
    const e = s + ARC;
    const seg = SEGS[i];

    // Segment
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();

    // Divider
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,200,0,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(s + ARC / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = seg.text;
    const lines = seg.label.filter(l => l);
    const fs = lines.length > 1 ? 11 : 13;
    ctx.font = `700 ${fs}px Oswald,sans-serif`;
    const lh = fs + 4;
    const oy = -(lines.length - 1) * lh / 2;
    lines.forEach((line, li) => {
      ctx.fillText(line, R - 12, oy + li * lh + fs * 0.35);
    });
    ctx.restore();
  }

  // Outer rim
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2 * Math.PI);
  ctx.strokeStyle = '#c8a000';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center hub
  const hub = ctx.createRadialGradient(CX, CY, 4, CX, CY, 40);
  hub.addColorStop(0, '#ffe066');
  hub.addColorStop(0.5, '#c8a000');
  hub.addColorStop(1, '#6a4800');
  ctx.beginPath();
  ctx.arc(CX, CY, 40, 0, 2 * Math.PI);
  ctx.fillStyle = hub;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.font = '700 10px Oswald,sans-serif';
  ctx.fillStyle = '#1a0800';
  ctx.textAlign = 'center';
  ctx.fillText('betorspin', CX, CY + 3);
}

drawWheel(angle);

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

function spin() {
  if (spinning || spinsLeft <= 0) return;
  spinning = true;
  spinsLeft--;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinsInfo').textContent = spinsLeft > 0 ? `${spinsLeft} Çevirme Hakkın Kaldı` : 'Hakkın kalmadı';
  document.getElementById('congratsTxt').textContent = '';

  const extraSpins = 5 + Math.random() * 4;
  const stopOffset = Math.random() * 2 * Math.PI;
  const total = extraSpins * 2 * Math.PI + stopOffset;
  const dur = 4200;
  const start = angle;
  let t0 = null;

  function frame(ts) {
    if (!t0) t0 = ts;
    const prog = Math.min((ts - t0) / dur, 1);
    angle = start + total * easeOut(prog);
    drawWheel(angle);
    if (prog < 1) { requestAnimationFrame(frame); }
    else { spinning = false; showResult(); }
  }
  requestAnimationFrame(frame);
}

function showResult() {
  // Which segment is under pointer (top = -PI/2)
  const ptr = -Math.PI / 2;
  const norm = ((ptr - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(norm / ARC) % N;
  const seg = SEGS[idx];

  document.getElementById('resEmoji').textContent = seg.icon;
  if (seg.win) {
    document.getElementById('resHeading').textContent = 'Tebrikler!';
    document.getElementById('resSub').textContent = `${seg.prize} kazandın! Siteye giderek ödülünü talep edebilirsin.`;
    document.getElementById('congratsTxt').textContent = 'Tebrikler! 🎉';
    launchConfetti();
    // Telegram bildirim gönder
    if (tg) tg.sendData(JSON.stringify({ event: 'spin_result', prize: seg.prize, win: true }));
  } else {
    document.getElementById('resHeading').textContent = 'Üzgünüm!';
    document.getElementById('resSub').textContent = 'Bu sefer olmadı. Siteye girerek yeni spin hakkı kazanabilirsin!';
    document.getElementById('congratsTxt').textContent = '';
    if (tg) tg.sendData(JSON.stringify({ event: 'spin_result', prize: null, win: false }));
  }
  setTimeout(() => document.getElementById('overlay').classList.add('show'), 400);
}

function closePopup() {
  document.getElementById('overlay').classList.remove('show');
  tg.openLink('https://cutt.ly/deoKNC0g');
}
// Confetti
function launchConfetti() {
  const cc = document.getElementById('confetti');
  cc.width = window.innerWidth;
  cc.height = window.innerHeight;
  const cx2 = cc.getContext('2d');
  const pieces = Array.from({length: 80}, () => ({
    x: Math.random() * cc.width,
    y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 5,
    color: ['#ffe066','#ff4444','#44aaff','#ffffff','#c8a000','#ff88aa'][Math.floor(Math.random()*6)],
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 3,
    rot: Math.random() * 360,
    rspeed: (Math.random() - 0.5) * 8,
    alpha: 1,
  }));
  let frame2;
  function animConfetti() {
    cx2.clearRect(0, 0, cc.width, cc.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rspeed;
      if (p.y < cc.height + 20) { alive = true; p.alpha = Math.max(0, p.alpha - 0.008); }
      cx2.save();
      cx2.globalAlpha = p.alpha;
      cx2.translate(p.x, p.y);
      cx2.rotate(p.rot * Math.PI / 180);
      cx2.fillStyle = p.color;
      cx2.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      cx2.restore();
    });
    if (alive) frame2 = requestAnimationFrame(animConfetti);
    else cx2.clearRect(0, 0, cc.width, cc.height);
  }
  cancelAnimationFrame(frame2);
  animConfetti();
  setTimeout(() => { cancelAnimationFrame(frame2); cx2.clearRect(0,0,cc.width,cc.height); }, 4000);
}
</script>
</body>
</html>
