<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Betorspin CS:GO Kasa Açılışı</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Oswald', sans-serif;
  background: #0d1117; /* CS:GO Koyu Tema */
  color: #fff;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* Kasa Açma Odası Atmosferi */
.bg-glow {
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 50% 50%, #1a2332 0%, #0d1117 70%),
    url('https://www.transparenttextures.com/patterns/dark-dotted.png'); /* Hafif doku */
  z-index: 0;
}

.container {
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px; position: relative; z-index: 1;
}

.main-title {
  font-size: 28px; font-weight: 700; text-transform: uppercase;
  margin-bottom: 20px; letter-spacing: 1px;
  text-align: center; color: #ececec;
}
.main-title span { color: #ccaa00; } /* Altın rengi */

/* 📦 CS:GO KASA KONTEYNERİ 📦 */
.case-wrap {
  position: relative;
  width: 100%; height: 220px;
  background: #161b22;
  border: 4px solid #30363d;
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  overflow: hidden; /* Dönen şerit için şart */
  margin-bottom: 30px;
  display: flex; align-items: center; justify-content: center;
}

/* Orta Çizgi (Kazanma Çizgisi) */
.win-line {
  position: absolute; top: 0; bottom: 0; left: 50%;
  width: 4px; background: #ccaa00;
  transform: translateX(-50%);
  z-index: 10;
  box-shadow: 0 0 15px #ccaa00;
}

/* 🎡 DÖNEN ÖDÜL ŞERİDİ (The Carousel) 🎡 */
.prizes-carousel {
  display: flex;
  position: absolute; top: 10px; bottom: 10px;
  left: 0; /* JavaScript ile hareket ettirilecek */
  will-change: transform;
}

/* Her Bir Ödül Kartı */
.prize-card {
  width: 150px; height: 100%;
  flex-shrink: 0;
  margin: 0 5px;
  background: #21262d;
  border: 2px solid #30363d;
  border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Ödül Nadirliği Çizgisi (Alt Taraf) */
.rarity-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 6px;
}

/* Ödül İkonu */
.prize-icon {
  font-size: 50px; margin-bottom: 10px;
}

/* Ödül Adı */
.prize-name {
  font-size: 16px; font-weight: 500;
  text-transform: uppercase;
  color: #c9d1d9;
  text-align: center; padding: 0 5px;
}

/* NADİRLİK RENKLERİ (CS:GO Stili) */
.common { background: #4b69ff; }    /* Mavi (Mil-Spec) */
.rare { background: #8847ff; }      /* Mor (Restricted) */
.mythical { background: #d32ce6; }  /* Pembe (Classified) */
.legendary { background: #eb4b4b; } /* Kırmızı (Covert) */
.ancient { background: #caab05; }   /* Altın (Nadir Özel) */
.fail { background: #5e5e5e; }      /* Gri (Çöp) */


/* 🔘 BUTON VE BİLGİ ALANI 🔘 */
.action-area {
  width: 100%; display: flex; flex-direction: column; align-items: center;
}

#openBtn {
  border: none; background: none; cursor: pointer;
  transition: 0.1s;
}
.btn-body {
  background: linear-gradient(180deg, #ccaa00 0%, #997a00 100%); /* Altın Buton */
  padding: 18px 60px; border-radius: 4px;
  color: #000; font-size: 22px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  box-shadow: 0 4px 0 #665200;
}
#openBtn:active:not(:disabled) { transform: translateY(2px); }
#openBtn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

#spinInfo {
  color: #8b949e; margin-top: 15px; font-weight: 500; font-size: 14px;
}

/* 📊 SONUÇ EKRANI (MODAL) YENİLENDİ 📊 */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
.overlay.show { display: flex; }

.modal {
  background: #161b22; border: 2px solid #30363d; border-radius: 8px;
  width: 90%; max-width: 360px; text-align: center;
  padding: 40px 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  transform: scale(0.8); opacity: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.overlay.show .modal { transform: scale(1); opacity: 1; }

.modal h2 { font-size: 28px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: #fff; }
.rarity-text { font-size: 14px; font-weight: 600; text-transform: uppercase; margin-bottom: 25px; }

/* Sonuç Kartı */
.result-card {
  background: #21262d; border: 3px solid #30363d;
  border-radius: 6px; padding: 30px; margin-bottom: 30px;
  position: relative; overflow: hidden;
}
.result-icon { font-size: 80px; margin-bottom: 15px; }
.result-prize { font-size: 24px; font-weight: 700; text-transform: uppercase; color: #fff; }

.modal-btn {
  background: #ccaa00; color: #000;
  border: none; padding: 18px; width: 100%;
  border-radius: 4px; font-size: 18px; font-weight: 700;
  cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">
  <h1 class="main-title">BETOR<span>SPIN</span><br>KASA AÇILIŞI</h1>

  <div class="case-wrap">
    <div class="win-line"></div>
    <div class="prizes-carousel" id="carousel"></div>
  </div>

  <div class="action-area">
    <button id="openBtn" onclick="startOpeningSequence()" disabled>
      <div class="btn-body">ANAHTARI KULLAN</div>
    </button>
    <p id="spinInfo">Yükleniyor...</p>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">TEBRİKLER!</h2>
    <p class="rarity-text" id="modalRarity">MİL-SPEC</p>
    
    <div class="result-card" id="resultCard">
      <div class="result-icon" id="modalIcon">🎰</div>
      <div class="result-prize" id="modalPrize">---</div>
      <div class="rarity-bar" id="modalRarityBar"></div>
    </div>
    
    <button class="modal-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
  </div>
</div>

<script>
// Telegram WebApp Ayarları
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0d1117'); tg.setBackgroundColor('#0d1117'); }

// --- CS:GO STİLİ ÖDÜL HAVUZU ---
const PRIZE_POOL = [
  { text:'100 FS',        p:'100 Freespin', icon:'🎰', r:'common' },
  { text:'BONUS',         p:'Yatırım Bonusu', icon:'💰', r:'rare' },
  { text:'100₺ NAKİT',    p:'100₺ Bakiye',   icon:'💵', r:'mythical' },
  { text:'VİP HEDİYE',    p:'VİP Hediye',     icon:'👑', r:'ancient' }, // Altın
  { text:'PAS',           p:null,             icon:'😐', r:'fail' },
  { text:'100₺ B.BUY',    p:'100₺ Bonus Buy', icon:'🎁', r:'legendary' }, // Kırmızı
  { text:'200 FS',        p:'200 Freespin', icon:'🎰', r:'mythical' },
  { text:'200₺ B.BUY',    p:'200₺ Bonus Buy', icon:'🎁', r:'legendary' }
];

const CAROUSEL_SIZE = 50; // Şeritteki toplam kart sayısı (Hız hissi için yüksek)
const CARD_WIDTH = 160; // Kart genişliği + margin (150+10)
const carousel = document.getElementById('carousel');
let canOpen = false;
let opening = false;
let winningIndex = 0; // Backend'den gelecek kazanan ödülün indexi

// --- ŞERİDİ HAZIRLA (Rastgele Kartlarla Doldur) ---
functionInitCarousel() {
  carousel.innerHTML = ''; // Temizle
  for (let i = 0; i < CAROUSEL_SIZE; i++) {
    // Rastgele bir ödül seç (Sadece görsel amaçlı)
    const prize = PRIZE_POOL[Math.floor(Math.random() * PRIZE_POOL.length)];
    createCard(prize);
  }
  // JavaScript'te başlangıç pozisyonunu ayarla (Orta çizgi ilk kartta olsun)
  carousel.style.transform = `translateX(${(document.querySelector('.case-wrap').offsetWidth / 2) - (CARD_WIDTH / 2)}px)`;
}

// Kart Oluşturma Yardımcısı
function createCard(prize) {
  const card = document.createElement('div');
  card.className = 'prize-card';
  card.innerHTML = `
    <div class="prize-icon">${prize.icon}</div>
    <div class="prize-name">${prize.text}</div>
    <div class="rarity-bar ${prize.r}"></div>
  `;
  carousel.appendChild(card);
}

// 🔥 KASA AÇMA SEKANSINI BAŞLATAN ANA FONKSİYON 🔥
function startOpeningSequence() {
  if (!canOpen || opening) return;
  opening = true;
  canOpen = false;
  document.getElementById('openBtn').disabled = true;
  document.getElementById('spinInfo').textContent = "Kasa açılıyor...";

  // 1. AŞAMA: Backend'den Kazanan Ödülü İste (Simülasyon)
  // Gerçek entegrasyonda buraya fetch() gelecek.
  winningIndex = Math.floor(Math.random() * PRIZE_POOL.length); // Rastgele birini seç
  const winPrize = PRIZE_POOL[winningIndex];

  // 2. AŞAMA: Kazanan Kartı Şeridin Sonuna Yakın Bir Yere Yerleştir
  const winCardIndex = CAROUSEL_SIZE - 5; // Sondan 5. kart kazanan olsun (Gerilim için)
  const cards = carousel.querySelectorAll('.prize-card');
  const winCard = cards[winCardIndex];
  
  // Kazanan kartın içeriğini gerçek kazananla değiştir
  winCard.innerHTML = `
    <div class="prize-icon">${winPrize.icon}</div>
    <div class="prize-name">${winPrize.text}</div>
    <div class="rarity-bar ${winPrize.r}"></div>
  `;

  // 3. AŞAMA: Animasyonu Başlat (Hızlı dönme ve yavaşlama)
  // Hesaplama: Kazanan kartın orta çizgiye gelmesi için gereken mesafe
  const containerWidth = document.querySelector('.case-wrap').offsetWidth;
  const finalX = -(winCardIndex * CARD_WIDTH) + (containerWidth / 2) - (CARD_WIDTH / 2);
  
  // CS:GO tarzı yavaşlama (cubic-bezier)
  carousel.style.transition = 'transform 5s cubic-bezier(0.1, 0.5, 0.1, 1)'; 
  carousel.style.transform = `translateX(${finalX}px)`;

  // Ses Efektini Başlat (Dönme sesi)
  playSpinSound();

  // 4. AŞAMA: Sonuç Ekranı Gelir
  setTimeout(() => {
    stopSpinSound();
    showResult(winPrize);
  }, 5200); // 5 saniye animasyon + 0.2 saniye bekleme
}

// Sonuç Ekranını Göster
function showResult(prize) {
  const isWin = prize.p !== null;
  
  // Modal Nadirlik Metni
  const rarityMap = { 'common':'MİL-SPEC', 'rare':'RESTRICTED', 'mythical':'CLASSIFIED', 'legendary':'COVERT', 'ancient':'KOPİS (NADİR)', 'fail':'ÇÖP' };
  
  document.getElementById('modalRarity').textContent = rarityMap[prize.r];
  document.getElementById('modalRarity').className = `rarity-text ${prize.r}`;
  
  // Sonuç Kartı
  document.getElementById('modalIcon').textContent = isWin ? prize.icon : '😐';
  document.getElementById('modalPrize').textContent = isWin ? prize.p : 'BOŞ ÇIKTI';
  document.getElementById('modalRarityBar').className = `rarity-bar ${prize.r}`;
  document.getElementById('modalTitle').textContent = isWin ? 'TEBRİKLER!' : 'ÜZGÜNÜZ';
  
  if(isWin) playWinSound(prize.r); else playLoseSound();
  vibrate(500); // Güçlü titreşim (açılma anı)
  
  document.getElementById('overlay').classList.add('show');
}

function goSite() {
  window.open('https://cutt.ly/7tF5Ow3K', '_blank');
}

// --- SES VE TİTREŞİM EFEKTLERİ (CS:GO TARZI) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
let spinOsc = null; // Dönme sesi için global değişken

function getACtx() { if (!actx) actx = new AudioCtx(); return actx; }
function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); }

// 🎡 CS:GO Dönme Sesi (Her kart geçişinde tık efekti)
function playSpinSound() {
  try {
    const a = getACtx();
    spinOsc = a.createOscillator();
    const g = a.createGain();
    spinOsc.connect(g); g.connect(a.destination);
    spinOsc.type = 'sawtooth';
    spinOsc.frequency.setValueAtTime(110, a.currentTime); // Düşük, ritmik ses
    g.gain.setValueAtTime(0.05, a.currentTime); // Çok kısık ses
    spinOsc.start();
    
    // Sesin periyodik olarak kesilip açılması (Tık-tık-tık hissi)
    for(let i=0; i<CAROUSEL_SIZE; i++) {
        const t = a.currentTime + (i * 0.1); // Hız sabit (Gerçek CSGO'da yavaşlar ama kod basit kalsın)
        if(t > a.currentTime + 4.5) break; // Son saniyelerde sesi kes
        g.gain.setValueAtTime(0.05, t);
        g.gain.setValueAtTime(0.001, t + 0.02);
    }
  } catch(e) {}
}
function stopSpinSound() { if(spinOsc) { spinOsc.stop(); spinOsc = null; } }

// Kazanma Sesleri (Nadirliğe göre değişir)
function playWinSound(rarity) {
  try {
    const a = getACtx();
    const notes = rarity === 'ancient' ? [523, 659, 784, 1047, 1318] : [523, 659, 784]; // Altınsa daha uzun melodi
    notes.forEach((freq, i) => {
      const o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination); o.type = 'triangle';
      const t = a.currentTime + i * 0.1;
      o.frequency.setValueAtTime(freq, t); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    });
  } catch(e) {}
}
function playLoseSound() { /* ... (eski kodla aynı) ... */ }

// --- SUNUCU ENTEGRASYONU simülasyonu ---
// 1. Şeridi hazırla
InitCarousel();

// 2. Bot simülasyonu için 1.5 saniye sonra hakkı aktif et
setTimeout(() => {
  canOpen = true;
  document.getElementById('openBtn').disabled = false;
  document.getElementById('spinInfo').textContent = "1 Kasa Açma Hakkın Var! 🔑";
  vibrate(100); // Kullanıcıya haber ver
}, 1500);
</script>
</body>
</html>
