<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Royal Fortune - Betorspin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }

body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

/* Görseldeki o derin siyah-turuncu atmosfer */
.royal-bg {
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 50% 45%, rgba(255, 69, 0, 0.2) 0%, transparent 60%),
    linear-gradient(180deg, #0a0a0a 0%, #000 100%);
  z-index: 0;
}

.app-container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 50px; height: 100vh;
}

/* Gold/Turuncu Premium Logo */
.brand { text-align: center; margin-bottom: 40px; }
.brand h1 { 
    font-size: 32px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(180deg, #fff 30%, #ff4500 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand p { font-size: 10px; letter-spacing: 5px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 5px; }

/* Wheel - Görseldeki o 3D Derinlik */
.wheel-master {
  position: relative; width: 340px; height: 340px;
  display: flex; align-items: center; justify-content: center;
}

/* Dış Metal Çerçeve */
.wheel-bezel {
  position: absolute; inset: -15px; border-radius: 50%;
  background: linear-gradient(145deg, #1f1f1f, #000);
  box-shadow: 
    0 30px 60px rgba(0,0,0,1), 
    inset 0 2px 3px rgba(255,255,255,0.1),
    0 0 20px rgba(255,69,0,0.15);
  border: 1px solid rgba(255,255,255,0.05);
}

/* Pointer - Daha keskin ve agresif */
.royal-pointer {
  position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
  z-index: 100; filter: drop-shadow(0 0 15px rgba(255,69,0,0.8));
}
.ptr-shape {
  width: 28px; height: 35px;
  background: linear-gradient(180deg, #fff, #ff4500);
  clip-path: polygon(50% 100%, 0 0, 100% 0);
}

/* Spin Button - Görseldeki o "Bas beni" diyen buton */
.action-area { margin-top: 50px; }
.royal-btn {
  background: linear-gradient(180deg, #ff8c00 0%, #ff4500 50%, #991500 100%);
  border: none; border-radius: 16px;
  padding: 22px 100px; color: #fff;
  font-size: 22px; font-weight: 900; letter-spacing: 4px;
  box-shadow: 0 15px 40px rgba(255,69,0,0.3), inset 0 2px 5px rgba(255,255,255,0.5);
  cursor: pointer; text-transform: uppercase;
  transition: 0.2s;
}
.royal-btn:active { transform: translateY(5px) scale(0.98); box-shadow: 0 5px 15px rgba(255,69,0,0.4); }

/* Sonuç Ekranı - Sıfır Emoji, Tam Asalet */
.modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
  z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px);
}
.modal-content {
  width: 85%; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px; text-align: center; padding: 50px 20px;
}
.modal-title { font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 3px; margin-bottom: 10px; }
.modal-prize { font-size: 36px; font-weight: 900; color: #ff4500; margin-bottom: 30px; text-shadow: 0 0 20px rgba(255,69,0,0.3); }
.modal-close {
  background: #fff; color: #000; padding: 20px 60px; border-radius: 15px;
  font-weight: 900; border: none; cursor: pointer; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="royal-bg"></div>

<div class="app-container">
  <div class="brand">
    <h1>BETORSPIN</h1>
    <p>PRIVÉ CASINO</p>
  </div>

  <div class="wheel-master">
    <div class="wheel-bezel"></div>
    <div class="royal-pointer"><div class="ptr-shape"></div></div>
    <canvas id="mainWheel" width="310" height="310" style="z-index:10; position:relative;"></canvas>
  </div>

  <div class="action-area">
    <button class="royal-btn" id="spinTrigger" onclick="startSpin()">ÇEVİR</button>
  </div>
</div>

<div class="modal" id="resultModal">
  <div class="modal-content">
    <div class="modal-title">ELDE EDİLEN ÖDÜL</div>
    <div class="modal-prize" id="prizeText">-</div>
    <button class="modal-close" onclick="location.reload()">TAMAM</button>
  </div>
</div>

<script>
const cv = document.getElementById('mainWheel'), ctx = cv.getContext('2d');
const segments = [
    "100 FREESPIN", "YATIRIM BONUSU", "100₺ BAKİYE", "VIP HEDİYE", "TEKRAR DENE", 
    "100₺ BONUS BUY", "200 FREESPIN", "TEKRAR DENE", "200₺ BONUS BUY", "TEKRAR DENE"
];
const colors = ["#000", "#111"];
const n = segments.length, arc = (Math.PI * 2) / n;
let currentAngle = 0;

function drawWheel(angle) {
    ctx.clearRect(0,0,310,310);
    const cx = 155, cy = 155, r = 150;

    segments.forEach((text, i) => {
        const start = angle + i * arc, end = start + arc;
        
        // Dilim
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end);
        ctx.fillStyle = colors[i % 2]; ctx.fill();
        
        // Gold Kenarlık
        ctx.strokeStyle = "rgba(255, 69, 0, 0.2)"; ctx.lineWidth = 1; ctx.stroke();

        // Metin Çizimi
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(start + arc/2);
        ctx.textAlign = "right"; ctx.fillStyle = (i % 2 === 0) ? "#ff4500" : "#fff";
        ctx.font = "bold 11px Inter";
        ctx.fillText(text, r - 25, 5);
        ctx.restore();
    });

    // Center Cap
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45);
    grad.addColorStop(0, "#333"); grad.addColorStop(1, "#000");
    ctx.beginPath(); ctx.arc(cx, cy, 45, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = "#ff4500"; ctx.lineWidth = 2; ctx.stroke();
}

function startSpin() {
    const btn = document.getElementById('spinTrigger');
    btn.disabled = true;
    
    const startTime = Date.now(), duration = 6000;
    const totalRotation = (10 + Math.random() * 5) * Math.PI * 2;

    function animate() {
        const elapsed = Date.now() - startTime, progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 4); // Smooth stop
        
        currentAngle = ease * totalRotation;
        drawWheel(currentAngle);

        if (progress < 1) requestAnimationFrame(animate);
        else finalize();
    }
    animate();
}

function finalize() {
    const norm = ((-Math.PI/2 - currentAngle) % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
    const idx = Math.floor(norm / arc) % n;
    document.getElementById('prizeText').textContent = segments[idx];
    document.getElementById('resultModal').style.display = 'flex';
}

drawWheel(0);
</script>
</body>
</html>
