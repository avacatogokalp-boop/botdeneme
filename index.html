<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şans Çarkı - Betorspin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rajdhani', sans-serif; /* FONT DEĞİŞTİ */
  background: #0a0a0a;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255,69,0,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,120,0,0.08) 0%, transparent 50%),
    #0a0a0a;
  z-index: 0;
}

.container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  padding: 28px 16px 40px;
}

.logo { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.logo .w { color: #fff; }
.logo .o { color: #ff4500; }
.logo .d { color: #ff8c00; }

.logo-line {
  width: 60px; height: 3px;
  background: linear-gradient(90deg, transparent, #ff4500, transparent);
  margin: 4px auto 12px;
}

.main-title {
  font-size: 34px; font-weight: 700; color: #fff;
  text-align: center; margin-bottom: 22px; line-height: 1.1;
  text-transform: uppercase;
}
.main-title em { font-style: normal; color: #ff4500; text-shadow: 0 0 15px rgba(255,69,0,0.5); }

/* Çark Alanı */
.wheel-wrap {
  position: relative;
  width: 300px; height: 300px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.ring-glow {
  position: absolute; inset: -12px; border-radius: 50%;
  background: conic-gradient(#ff4500, #ff8c00, #ffc200, #ff8c00, #ff4500, #cc2200, #ff4500);
  animation: spinRing 5s linear infinite;
  opacity: 0.7;
}
.ring-glow-mask { position: absolute; inset: -6px; border-radius: 50%; background: #0a0a0a; }
@keyframes spinRing { to { transform: rotate(360deg); } }

canvas#wheel {
  border-radius: 50%; position: relative; z-index: 5;
  box-shadow: 0 0 0 4px #fff, 0 0 20px rgba(255,255,255,0.2);
}

.pointer {
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  filter: drop-shadow(0 0 10px #ff4500);
}
.ptr-tri {
  width: 0; height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 25px solid #fff;
}

/* Butonlar */
#spinBtn { background: none; border: none; cursor: pointer; outline: none; transition: 0.2s; }
.btn-body {
  background: linear-gradient(180deg, #ff4500 0%, #cc2200 100%);
  color: #fff; font-size: 24px; font-weight: 700;
  border-radius: 50px; padding: 15px 70px;
  box-shadow: 0 6px 0 #801100, 0 10px 20px rgba(255,69,0,0.3);
  text-transform: uppercase;
}
#spinBtn:active { transform: translateY(4px); }
#spinBtn:disabled .btn-body { opacity: 0.5; box-shadow: none; }

/* SONUÇ EKRANI (MODAL) YENİLENDİ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
.overlay.show { display: flex; }

.rcard {
  width: 90%; max-width: 320px;
  background: #1a1a1a;
  border-radius: 30px; border: 2px solid #ff4500;
  text-align: center; overflow: hidden;
  box-shadow: 0 0 50px rgba(255,69,0,0.4);
}
.rcard-top { padding: 40px 20px 20px; }
.rcard-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 15px; }
.rcard-badge {
  display: inline-block;
  background: #fff; color: #ff4500;
  font-size: 32px; font-weight: 700; /* ÖDÜLÜ BÜYÜTTÜK */
  padding: 10px 25px; border-radius: 15px;
  margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.3);
}
.rcard-btn {
  width: 100%; background: #ff4500;
  color: #fff; font-size: 20px; font-weight: 700;
  padding: 18px; border: none; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="container">
  <div class="logo"><span class="w">betor</span><span class="o">spin</span><span class="d">.</span></div>
  <div class="logo-line"></div>
  <div class="main-title">ŞANSINI <em>DENE!</em></div>

  <div class="wheel-wrap">
    <div class="ring-glow"></div>
    <div class="ring-glow-mask"></div>
    <div class="pointer"><div class="ptr-tri"></div></div>
    <canvas id="wheel" width="286" height="286"></canvas>
  </div>

  <button id="spinBtn" onclick="spin()" disabled>
    <div class="btn-body">ÇEVİR</div>
  </button>
  
  <p id="spinInfo" style="color: #666; margin-top: 15px; font-weight: 600;">Yükleniyor...</p>
</div>

<div class="overlay" id="overlay">
  <div class="rcard">
    <div class="rcard-top">
      <div class="rcard-title" id="rTitle">TEBRİKLER!</div>
      <div class="rcard-badge" id="rBadge">100 FS</div>
      <p id="rText" style="color: #aaa; margin-bottom: 25px;">Ödülün hazır! Hemen kayıt ol ve oynamaya başla.</p>
    </div>
    <button class="rcard-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
  </div>
</div>

<script>
const SEGS = [
  { text:'100 FS',        bg:'#2c3e50', win:true,  prize:'100 Freespin' },
  { text:'BONUS',         bg:'#d35400', win:true,  prize:'Yatırım Bonusu' },
  { text:'100₺ NAKİT',    bg:'#27ae60', win:true,  prize:'100₺ Bakiye' },
  { text:'VİP HEDİYE',    bg:'#8e44ad', win:true,  prize:'VİP Hediye' },
  { text:'TEKRAR DENE',   bg:'#1a1a1a', win:false, prize:null },
  { text:'100₺ B.BUY',    bg:'#f39c12', win:true,  prize:'100₺ Bonus Buy' },
  { text:'200 FS',        bg:'#2980b9', win:true,  prize:'200 Freespin' },
  { text:'TEKRAR DENE',   bg:'#1a1a1a', win:false, prize:null },
  { text:'200₺ B.BUY',    bg:'#c0392b', win:true,  prize:'200₺ Bonus Buy' },
  { text:'TEKRAR DENE',   bg:'#1a1a1a', win:false, prize:null },
];

const cv=document.getElementById('wheel'), ctx=cv.getContext('2d'), N=SEGS.length, ARC=(2*Math.PI)/N;
const CX=143, CY=143, R=138;
let angle=0, spinning=false;

function draw(a) {
  ctx.clearRect(0,0,286,286);
  for(let i=0;i<N;i++){
    const s=a+i*ARC, e=s+ARC, seg=SEGS[i];
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.fillStyle=seg.bg; ctx.fill();
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.stroke();

    ctx.save(); ctx.translate(CX,CY); ctx.rotate(s+ARC/2);
    ctx.font='700 16px Rajdhani'; // YAZILAR DEV GİBİ OLDU
    ctx.fillStyle='#ffffff';
    ctx.fillText(seg.text, 50, 5);
    ctx.restore();
  }
}
draw(0);

function spin() {
  if(spinning) return;
  spinning=true;
  const total = (8 + Math.random()*5) * 2 * Math.PI;
  const startAngle = angle;
  const duration = 4000;
  let startTime = null;

  function animate(time) {
    if(!startTime) startTime = time;
    const progress = (time - startTime) / duration;
    const ease = 1 - Math.pow(1 - progress, 4);
    angle = startAngle + total * ease;
    draw(angle);
    if(progress < 1) requestAnimationFrame(animate);
    else finishSpin();
  }
  requestAnimationFrame(animate);
}

function finishSpin() {
  spinning = false;
  const norm = ((-Math.PI/2 - angle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  const idx = Math.floor(norm / ARC) % N;
  const seg = SEGS[idx];

  document.getElementById('rBadge').textContent = seg.win ? seg.prize : '0 TL';
  document.getElementById('rTitle').textContent = seg.win ? 'TEBRİKLER!' : 'ÜZGÜNÜZ';
  document.getElementById('overlay').classList.add('show');
}

function goSite() {
  window.open('https://cutt.ly/7tF5Ow3K', '_blank');
}

// Bot simülasyonu için butonu aktif et
setTimeout(() => { document.getElementById('spinBtn').disabled = false; document.getElementById('spinInfo').textContent = "1 Çevirme Hakkın Var!"; }, 1000);
</script>
</body>
</html>
