<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetorSpin - Şans Çarkı</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0c0c0c;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }

        .logo span {
            color: #ff4500;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #ff4500;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            z-index: 10;
        }

        .spin-button {
            margin-top: 30px;
            width: 250px;
            padding: 15px;
            background-color: #ff4500;
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }

        .info {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .invite-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background-color: #ff4500;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">betor<span>spin.</span></div>
        <p>ŞANS ÇARKI</p>
        <h2>Çevir & Kazan!</h2>
    </div>

    <div class="wheel-container">
        <img src="https://img.freepik.com/free-vector/wheel-fortune-concept_23-2148467406.jpg" id="wheel" alt="Çark">
        <div class="pointer">▼</div>
    </div>

    <button class="spin-button" onclick="spin()">ÇEVİR</button>

    <div class="info">
        • 99 Çevirme Hakkın Var 🎯 •
    </div>

    <a href="#" class="invite-btn">
        👥 Arkadaşını Davet Et <span class="badge">+1 Spin</span>
    </a>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        function spin() {
            const wheel = document.getElementById('wheel');
            const randomDegree = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            setTimeout(() => {
                // Senin orijinal yönlendirme kodun buraya gelecek
                window.location.href = "SENIN_SITE_LINKIN"; 
            }, 5500);
        }
    </script>
</body>
</html>
