<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Betorspin Premium Çark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
        }

        @keyframes shine { to { background-position: 300% center; } }
        @keyframes popIn {
            from { transform: scale(0.8) translateY(30px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-shine { animation: shine 3s linear infinite; }
        .animate-popIn { animation: popIn 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        .rotate-glow { animation: rotateGlow 8s linear infinite; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        canvas { touch-action: none; }
    </style>
</head>
<body class="text-white">
    <!-- Dinamik Arka Plan -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-[#050505]"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#ff4500] opacity-[0.08] blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#ff8c00] opacity-[0.05] blur-[150px] rounded-full"></div>
    </div>

    <!-- Admin Rozeti -->
    <div id="adminBadge" class="hidden fixed top-4 right-4 z-[100] glass px-3 py-1 rounded-full border-[#ff4500]/30">
        <span class="text-[10px] font-black text-[#ff4500] tracking-widest uppercase">Admin Mode</span>
    </div>

    <!-- Ana İçerik -->
    <div class="relative z-10 flex flex-col items-center min-h-screen px-6 py-8 pb-12">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">
            <div class="text-[28px] font-black tracking-tighter mb-1">
                <span class="text-white">betor</span><span class="text-[#ff4500]">spin</span><span class="text-[#ff8c00]">.</span>
            </div>
            <div class="w-16 h-[2px] bg-gradient-to-r from-transparent via-[#ff4500] to-transparent opacity-50"></div>
        </div>

        <!-- Çark ve Model Konteynırı -->
        <div class="relative flex flex-col lg:flex-row items-center justify-center gap-10 mb-10">
            
            <!-- Çark Alanı -->
            <div class="relative w-[310px] h-[310px] flex items-center justify-center">
                <!-- Dönen Işık Halkası -->
                <div class="absolute -inset-4 rounded-full border-[1px] border-white/5 rotate-glow">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-2 h-2 bg-[#ff4500] rounded-full shadow-[0_0_15px_#ff4500]"></div>
                </div>
                
                <!-- Çark Çerçevesi -->
                <div class="absolute -inset-2.5 rounded-full bg-[conic-gradient(from_0deg,#ff4500,#ff8c00,#ffc200,#ff8c00,#ff4500)] opacity-40 blur-[2px]"></div>
                <div class="absolute -inset-1.5 rounded-full bg-[#050505]"></div>
                
                <!-- İbre -->
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 z-30 flex flex-col items-center drop-shadow-[0_4px_10px_rgba(255,69,0,0.8)]">
                    <div class="w-5 h-5 rounded-full bg-gradient-to-br from-white via-[#ff8c00] to-[#ff4500] border-2 border-white/40 shadow-inner -mb-1 z-1"></div>
                    <div class="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[24px] border-t-[#ff4500]"></div>
                </div>

                <canvas id="wheelCanvas" width="286" height="286" class="rounded-full relative z-10 shadow-[0_25px_60px_rgba(0,0,0,0.8)]"></canvas>
            </div>

            <!-- Kadın Modeli Alanı -->
            <div class="hidden lg:block relative w-[200px] animate-float">
                <!-- Buraya fotoğrafını atınca src kısmını değiştir kankam -->
                <img src="https://picsum.photos/seed/casino-model/400/800" alt="Model" class="w-full h-auto drop-shadow-[0_0_30px_rgba(255,69,0,0.3)] filter brightness-110" referrerPolicy="no-referrer">
            </div>
        </div>

        <!-- Kontrol Alanı -->
        <div class="w-full max-w-[320px] flex flex-col items-center">
            <div class="relative w-full mb-5">
                <div id="btnGlow" class="absolute -inset-1 rounded-[50px] bg-gradient-to-r from-[#ff4500] via-[#ffc200] to-[#ff4500] bg-[length:200%_auto] animate-shine blur-[12px] opacity-50"></div>
                <button id="spinBtn" class="relative w-full bg-none border-none cursor-pointer outline-none disabled:opacity-30 disabled:grayscale group">
                    <div class="relative bg-gradient-to-b from-[#ff5500] via-[#cc2200] to-[#991500] text-white text-[20px] font-black tracking-[6px] uppercase rounded-[50px] py-4.5 border border-white/10 shadow-[0_6px_0_#5a0800,inset_0_1px_0_rgba(255,255,255,0.15)] transition-all active:translate-y-1 active:shadow-[0_1px_0_#5a0800]">
                        ÇEVİR
                    </div>
                </button>
            </div>

            <div id="spinInfo" class="text-[12px] font-bold text-white/30 tracking-[2px] uppercase flex items-center gap-3 mb-8">
                <div class="w-1.5 h-1.5 rounded-full bg-[#ff4500] animate-pulse"></div>
                <span>Yükleniyor...</span>
                <div class="w-1.5 h-1.5 rounded-full bg-[#ff4500] animate-pulse"></div>
            </div>

            <button onclick="shareInvite()" class="w-full glass rounded-2xl py-4 flex items-center justify-center gap-3 text-sm font-bold active:bg-white/5 transition-all border-white/5">
                Arkadaşını Davet Et
                <span class="bg-gradient-to-r from-[#ff4500] to-[#ff8c00] text-[10px] font-black px-2.5 py-0.5 rounded-lg tracking-tighter">+1 SPIN</span>
            </button>
        </div>

        <!-- Geri Sayım Banner -->
        <div id="noSpinBanner" class="hidden mt-8 glass rounded-[28px] p-7 text-center w-full max-w-[320px] animate-popIn border-[#ff4500]/10">
            <div class="text-white font-black text-lg mb-1 tracking-tight">Bugünkü Hakkını Kullandın!</div>
            <div class="text-[11px] text-white/40 font-bold uppercase tracking-widest mb-5">Yeni hak için bekle</div>
            
            <div class="mb-6 relative">
                <div id="countdown" class="text-[32px] font-black text-[#ff4500] tracking-[4px] tabular-nums drop-shadow-[0_0_15px_rgba(255,69,0,0.5)]">00:00:00</div>
            </div>
            
            <button onclick="goSite()" class="w-full bg-gradient-to-r from-[#ff4500] to-[#ff6a00] text-white text-sm font-black rounded-xl py-4 mb-3 shadow-[0_10px_20px_rgba(255,69,0,0.3)]">SİTEYE GİT VE OYNA</button>
            <button onclick="shareInvite()" class="w-full text-white/50 text-[12px] font-bold py-2">Davet Et → Hemen +1 Spin Kazan</button>
        </div>
    </div>

    <!-- Sonuç Overlay -->
    <div id="overlay" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center backdrop-blur-xl">
        <div class="w-[85%] max-w-[320px] glass rounded-[32px] overflow-hidden animate-popIn">
            <div id="overlayHeader" class="pt-10 px-8 pb-6 text-center border-b border-white/5">
                <div id="resultTitle" class="text-[28px] font-black text-white mb-3 tracking-tighter">Tebrikler!</div>
                <div id="prizeBadge" class="inline-block bg-gradient-to-r from-[#ff4500] to-[#ff8c00] text-white text-[14px] font-black px-6 py-2 rounded-full shadow-lg">Ödül</div>
            </div>
            <div class="p-8 text-center">
                <div id="resultDesc" class="text-sm text-white/50 leading-relaxed mb-8 font-medium">Ödül kazandın!</div>
                <button id="overlayBtn" onclick="closeOverlay()" class="w-full bg-gradient-to-r from-[#ff4500] to-[#ff6a00] text-white text-base font-black rounded-2xl py-4.5 shadow-[0_15px_30px_rgba(255,69,0,0.45)]">
                    SİTEYE GİT VE OYNA
                </button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_IDS = ['243111766253', 'guest', 'erdemcevik331407']; 
        
        const SEGS = [
            { lines:['100','FREESPIN'],         bg:'#0a1a3a', stroke:'#1a4aaa', tc:'#77b5ff', win:true,  prize:'100 Freespin'          },
            { lines:['ÖZEL YATIRIM','BONUSU'], bg:'#2a1a00', stroke:'#cc6600', tc:'#ffcc66', win:true,  prize:'Özel Yatırım Bonusu'   },
            { lines:['100₺','BAKİYE'],         bg:'#0a2a10', stroke:'#0a8a35', tc:'#66ff99', win:true,  prize:'100₺ Bakiye'            },
            { lines:['VİP','HEDİYE'],          bg:'#220a30', stroke:'#8800cc', tc:'#ee99ff', win:true,  prize:'VİP Hediye'            },
            { lines:['KAYBETTİN',''],          bg:'#1a1a1a', stroke:'#333',    tc:'#888',    win:false, prize:null                    },
            { lines:['+1','SPIN'],             bg:'#222',    stroke:'#ff4500', tc:'#ffffff', win:true,  prize:'+1 Spin', extra:true   },
            { lines:['100₺','BONUS BUY'],      bg:'#2a1c00', stroke:'#d49500', tc:'#ffe066', win:true,  prize:'100₺ Bonus Buy'        },
            { lines:['200','FREESPIN'],         bg:'#0a1f44', stroke:'#1155cc', tc:'#66a3ff', win:true,  prize:'200 Freespin'          },
            { lines:['KAYBETTİN',''],          bg:'#1a1a1a', stroke:'#333',    tc:'#888',    win:false, prize:null                    },
            { lines:['200₺','BONUS BUY'],      bg:'#332200', stroke:'#bb8800', tc:'#ffdd44', win:true,  prize:'200₺ Bonus Buy'        },
            { lines:['KAYBETTİN',''],          bg:'#1a1a1a', stroke:'#333',    tc:'#888',    win:false, prize:null                    },
        ];

        const N = SEGS.length;
        const ARC = (2 * Math.PI) / N;
        const CX = 143;
        const CY = 143;
        const R = 138;

        let angle = 0;
        let spinning = false;
        let spinAllowed = true;
        let audioCtx = null;
        let isAdmin = false;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const spinInfo = document.getElementById('spinInfo').querySelector('span');
        const tg = window.Telegram?.WebApp;
        const USER_ID = String(tg?.initDataUnsafe?.user?.id || 'guest');

        if (ADMIN_IDS.includes(USER_ID)) {
            isAdmin = true;
            document.getElementById('adminBadge').classList.remove('hidden');
        }

        function getACtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function vibrate(p) {
            if (navigator.vibrate) navigator.vibrate(p);
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function playTick() {
            try {
                const a = getACtx();
                const o = a.createOscillator();
                const g = a.createGain();
                o.connect(g); g.connect(a.destination);
                o.type = 'sine';
                o.frequency.setValueAtTime(600, a.currentTime);
                o.frequency.exponentialRampToValueAtTime(200, a.currentTime + 0.06);
                g.gain.setValueAtTime(0.15, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.06);
                o.start(); o.stop(a.currentTime + 0.06);
            } catch (e) {}
        }

        function playWin() {
            try {
                const a = getACtx();
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const o = a.createOscillator();
                    const g = a.createGain();
                    o.connect(g); g.connect(a.destination);
                    o.type = 'triangle';
                    const t = a.currentTime + i * 0.1;
                    o.frequency.setValueAtTime(freq, t);
                    g.gain.setValueAtTime(0.2, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                    o.start(t); o.stop(t + 0.3);
                });
                vibrate([50, 30, 80, 30, 150]);
            } catch (e) {}
        }

        function draw(a) {
            ctx.clearRect(0, 0, 286, 286);
            for (let i = 0; i < N; i++) {
                const s = a + i * ARC;
                const e = s + ARC;
                const seg = SEGS[i];
                
                ctx.beginPath();
                ctx.moveTo(CX, CY);
                ctx.arc(CX, CY, R, s, e);
                ctx.closePath();
                ctx.fillStyle = seg.bg;
                ctx.fill();
                
                const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = seg.stroke;
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.save();
                ctx.translate(CX, CY);
                ctx.rotate(s + ARC / 2);
                ctx.textAlign = 'right';
                const ls = seg.lines.filter(l => l);
                const fs = ls.length > 1 ? 10 : 12;
                ctx.font = `900 ${fs}px 'Inter', sans-serif`;
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 5;
                ctx.fillStyle = seg.tc;
                const lh = fs + 4;
                const oy = (-(ls.length - 1) * lh) / 2;
                ls.forEach((l, li) => ctx.fillText(l, R - 15, oy + li * lh + fs * 0.35));
                ctx.restore();
            }

            // BETORSPIN MERKEZ LOGOSU
            ctx.beginPath(); ctx.arc(CX,CY,36,0,2*Math.PI);
            const hg = ctx.createRadialGradient(CX-5, CY-5, 2, CX, CY, 36);
            hg.addColorStop(0, '#333'); hg.addColorStop(1, '#000');
            ctx.fillStyle = hg; ctx.fill();
            ctx.strokeStyle = '#ff4500'; ctx.lineWidth = 2.5; ctx.stroke();
            
            // Logo Metni
            ctx.save();
            ctx.translate(CX, CY);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = '900 8px Inter';
            ctx.fillText('BETOR', 0, -2);
            ctx.fillStyle = '#ff4500';
            ctx.font = '900 8px Inter';
            ctx.fillText('SPIN', 0, 8);
            ctx.restore();
        }

        function checkSpinRight() {
            if (isAdmin) {
                spinAllowed = true;
                spinBtn.disabled = false;
                document.getElementById('btnGlow').classList.remove('hidden');
                spinInfo.innerText = 'Sınırsız Hak (Admin)';
                return;
            }

            const lastSpin = localStorage.getItem(`last_spin_${USER_ID}`);
            if (lastSpin) {
                const diff = Date.now() - parseInt(lastSpin);
                if (diff < 24 * 60 * 60 * 1000) {
                    spinAllowed = false;
                    document.getElementById('noSpinBanner').classList.remove('hidden');
                    spinBtn.disabled = true;
                    document.getElementById('btnGlow').classList.add('hidden');
                    spinInfo.innerText = 'Hakkın Bitti';
                    return;
                }
            }
            spinAllowed = true;
            document.getElementById('noSpinBanner').classList.add('hidden');
            spinBtn.disabled = false;
            document.getElementById('btnGlow').classList.remove('hidden');
            spinInfo.innerText = '1 Çevirme Hakkın Var';
        }

        spinBtn.onclick = () => {
            if (spinning || !spinAllowed) return;
            spinning = true;
            spinAllowed = false;
            spinBtn.disabled = true;
            spinInfo.innerText = 'Bol Şans!';
            
            const total = (7 + Math.random() * 5) * 2 * Math.PI + Math.random() * 2 * Math.PI;
            const dur = 5000;
            const start = angle;
            let t0 = null;
            let lastTick = start;

            function frame(ts) {
                if (!t0) t0 = ts;
                const prog = Math.min((ts - t0) / dur, 1);
                const cur = start + total * (1 - Math.pow(1 - prog, 5));
                
                if (Math.abs(cur - lastTick) >= (2 * Math.PI / 12)) {
                    lastTick = cur;
                    playTick();
                    vibrate(6);
                }

                angle = cur;
                draw(cur);
                if (prog < 1) requestAnimationFrame(frame);
                else {
                    spinning = false;
                    const norm = ((-Math.PI / 2 - cur) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
                    const idx = Math.floor(norm / ARC) % N;
                    showResult(SEGS[idx]);
                }
            }
            requestAnimationFrame(frame);
        };

        function showResult(res) {
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('resultTitle');
            const badge = document.getElementById('prizeBadge');
            const desc = document.getElementById('resultDesc');
            const btn = document.getElementById('overlayBtn');

            if (res.extra) {
                spinAllowed = true;
                spinBtn.disabled = false;
                spinInfo.innerText = 'Ekstra Spin!';
                title.innerText = 'Harika!';
                badge.innerText = '+1 SPIN';
                desc.innerText = 'Şansın devam ediyor! Bir kez daha çevirme hakkı kazandın.';
                btn.innerText = 'TEKRAR ÇEVİR';
                playWin();
            } else {
                if (!isAdmin) localStorage.setItem(`last_spin_${USER_ID}`, Date.now().toString());
                if (res.win) {
                    title.innerText = 'Tebrikler!';
                    badge.innerText = res.prize;
                    desc.innerText = res.prize + ' kazandın! Hemen siteye gir ve ödülünü al!';
                    btn.innerText = 'SİTEYE GİT VE OYNA';
                    playWin();
                } else {
                    title.innerText = 'Olmadı';
                    badge.innerText = 'Kayıp';
                    desc.innerText = 'Üzülme! Arkadaşını davet et, +1 Spin kazan';
                    btn.innerText = 'DAVET ET VE DENE';
                }
            }
            overlay.classList.remove('hidden');
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            checkSpinRight();
        }

        function shareInvite() {
            const link = `https://t.me/PrimeXBos_bot?start=ref_${USER_ID}`;
            if (tg) tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Betorspin Şans Çarkını dene!`);
            else { navigator.clipboard.writeText(link); alert('Link kopyalandı!'); }
        }

        function goSite() {
            if (tg) { tg.openLink('https://cutt.ly/7tF5Ow3K'); setTimeout(() => tg.close(), 500); }
            else window.open('https://cutt.ly/7tF5Ow3K', '_blank');
        }

        setInterval(() => {
            if (isAdmin) return;
            const lastSpin = localStorage.getItem(`last_spin_${USER_ID}`);
            if (lastSpin) {
                const diff = (parseInt(lastSpin) + 24 * 60 * 60 * 1000) - Date.now();
                if (diff <= 0) checkSpinRight();
                else {
                    const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
                    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                    document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
                }
            }
        }, 1000);

        if (tg) { tg.ready(); tg.expand(); }
        checkSpinRight();
        draw(0);
    </script>
</body>
</html>
