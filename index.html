<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şans Çarkı - Betorspin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Montserrat', sans-serif; background: #0d0806; min-height: 100vh; overflow-x: hidden; }
.bg { position: fixed; inset: 0; background: radial-gradient(ellipse 100% 60% at 50% -10%, rgba(255,69,0,0.3) 0%, transparent 70%), radial-gradient(ellipse 60% 50% at 95% 95%, rgba(255,100,0,0.15) 0%, transparent 60%), radial-gradient(circle at 50% 50%, rgba(255, 30, 0, 0.05) 0%, transparent 60%), #080402; z-index: 0; }
.bg::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255, 60, 0, 0.03) 10deg 20deg); animation: bgRays 60s linear infinite; z-index: 0; pointer-events: none; }
@keyframes bgRays { to { transform: rotate(360deg); } }
.container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 30px 16px 40px; }
.logo { font-size: 30px; font-weight: 900; margin-bottom: 4px; text-transform: uppercase; }
.logo .w { color: #fff; } .logo .o { color: #ff5500; } .logo .d { color: #ff8c00; }
.logo-line { width: 100px; height: 3px; background: linear-gradient(90deg, transparent, #ff4500, transparent); margin: 10px auto 12px; }
.logo-sub { font-size: 14px; font-weight: 700; color: #796e67; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 24px; }
.main-title { font-size: 38px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 30px; line-height: 1.1; text-transform: uppercase; }
.main-title em { font-style: normal; color: #ff5500; }
.wheel-wrap { position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
.ring-glow { position: absolute; inset: -10px; border-radius: 50%; background: conic-gradient(#ff4500, #ff6a00, #ff8c00, #ff6a00, #ff4500, #cc3000, #ff4500); animation: spinRing 5s linear infinite; opacity: 0.6; }
.ring-glow-mask { position: absolute; inset: -5px; border-radius: 50%; background: #0d0806; }
@keyframes spinRing { to { transform: rotate(360deg); } }
#spotlight { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 286px; height: 286px; border-radius: 50%; pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.3s; }
.pointer { position: absolute; top: -14px; left: 50%; transform-origin: 50% 10px; transform: translateX(-50%) rotate(0deg); transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.95)) drop-shadow(0 4px 6px rgba(255,69,0,0.6)); }
.pointer.ticking { transform: translateX(-50%) rotate(-35deg); transition: transform 0.02s ease-out; }
.ptr-ball { width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #ffffff 0%, #ff8c00 30%, #5a1100 100%); border: 3px solid rgba(255,230,150,0.9); margin-bottom: -5px; z-index: 1; }
.ptr-tri { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 28px solid #ff4500; position: relative; }
.ptr-tri::after { content:''; position: absolute; top:-28px; left:-10px; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 26px solid rgba(255,255,255,0.4); pointer-events:none; }
canvas#wheel { border-radius: 50%; position: relative; z-index: 5; box-shadow: 0 0 0 1px #000, 0 15px 40px rgba(0,0,0,0.9); }
.btn-area { position: relative; margin-bottom: 14px; width: 100%; max-width: 320px; display: flex; justify-content: center; }
#spinBtn { position: relative; background: none; border: none; cursor: pointer; outline: none; width: 100%; max-width: 280px; }
@keyframes pulseGlow { 0% { box-shadow: 0 0 20px rgba(255,76,0,0.4); } 50% { box-shadow: 0 0 50px rgba(255,100,0,0.8); } 100% { box-shadow: 0 0 20px rgba(255,76,0,0.4); } }
@keyframes shineBtn { 0% { transform: rotate(45deg) translateX(-200%); } 20%, 100% { transform: rotate(45deg) translateX(300%); } }
.btn-body { position: relative; overflow: hidden; background: linear-gradient(180deg, #ff4400 0%, #aa1100 80%, #660000 100%); color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.9); font-family: inherit; font-size: 28px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; border-radius: 40px; padding: 18px 0; border: 1px solid rgba(255,200,100,0.5); box-shadow: 0 8px 0 #7a0b00, 0 15px 25px rgba(0,0,0,0.8); animation: pulseGlow 2.5s infinite; transition: transform .1s, box-shadow .1s; width: 100%; }
.btn-body::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%); border-radius: 40px 40px 0 0; pointer-events: none; }
.btn-body::after { content: ''; position: absolute; top: -50%; left: -50%; width: 50%; height: 200%; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%); transform: rotate(45deg) translateX(-150%); animation: shineBtn 5s infinite; pointer-events: none; }
#spinBtn:active:not(:disabled) .btn-body { transform: translateY(8px); box-shadow: 0 0px 0 #7a0b00; }
#spinBtn:disabled .btn-body { opacity: 0.4; cursor: not-allowed; animation: none; box-shadow: none; }
.spin-info { font-size: 14px; font-weight: 800; color: #928b86; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 10px; margin-bottom: 20px; }
.spin-info::before, .spin-info::after { content: ''; display: block; width: 7px; height: 7px; border-radius: 50%; background: #ff4500; flex-shrink: 0; }
.invite-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,100,0,0.3); border-radius: 20px; padding: 16px 20px; color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; max-width: 300px; transition: all .2s; }
.invite-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.97); }
.invite-badge { color: #ffffff; font-weight: 800; }
.ticker-wrap { width: 100%; max-width: 300px; margin: 12px auto 0; overflow: hidden; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,100,0,0.25); padding: 10px 0; position: relative; }
.ticker-wrap::before, .ticker-wrap::after { content: ''; position: absolute; top: 0; bottom: 0; width: 40px; z-index: 2; pointer-events: none; }
.ticker-wrap::before { left: 0; background: linear-gradient(90deg, #0d0806 60%, transparent); }
.ticker-wrap::after { right: 0; background: linear-gradient(270deg, #0d0806 60%, transparent); }
.ticker-track { display: flex; width: max-content; animation: ticker 28s linear infinite; }
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item { display: flex; align-items: center; gap: 6px; padding: 0 20px; font-size: 12px; font-weight: 700; white-space: nowrap; color: rgba(255,255,255,0.75); }
.ticker-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff4500; flex-shrink: 0; }
.ticker-name { color: #ff8c00; } .ticker-won { color: #ff6a00; font-weight: 800; } .ticker-prize { color: #fff; } .ticker-sep { color: rgba(255,69,0,0.4); margin: 0 4px; font-size: 10px; }
.no-spin-banner { display: none; margin-top: 18px; background: rgba(20,10,5,0.6); border: 1px solid rgba(255,69,0,0.3); border-radius: 16px; padding: 18px 22px; text-align: center; max-width: 300px; width: 100%; }
.no-spin-banner .ns-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.no-spin-banner .ns-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; margin-bottom: 10px; }
.ns-countdown-wrap { margin-bottom: 12px; }
.ns-countdown-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.ns-countdown { font-size: 22px; font-weight: 900; color: #ff4500; letter-spacing: 3px; font-variant-numeric: tabular-nums; }
.no-spin-banner .ns-btn { background: linear-gradient(135deg, #ff4500, #ff6a00); color: #fff; font-family: inherit; font-size: 14px; font-weight: 900; border: none; border-radius: 12px; padding: 12px 28px; cursor: pointer; display: block; width: 100%; margin-bottom: 10px; }
.no-spin-banner .ns-invite { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); font-family: inherit; font-size: 13px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 11px 28px; cursor: pointer; display: block; width: 100%; }
.overlay { display: none; position: fixed; inset: 0; overflow: hidden; background: rgba(0,0,0,0.92); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.overlay.show { display: flex; }
.overlay-rays { position: absolute; top: 50%; left: 50%; width: 200vw; height: 200vw; max-width: 1000px; max-height: 1000px; background: repeating-conic-gradient(rgba(255,100,0,0.12) 0 10deg, transparent 10deg 20deg); transform: translate(-50%,-50%); animation: spinRays 30s linear infinite; pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 0; }
.overlay.show .overlay-rays { opacity: 1; }
@keyframes spinRays { 100% { transform: translate(-50%,-50%) rotate(360deg); } }
.rcard { position: relative; z-index: 1; width: 88%; max-width: 320px; background: rgba(20,10,5,0.7); backdrop-filter: blur(16px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,100,0,0.4); box-shadow: 0 40px 80px rgba(0,0,0,0.9); animation: popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from { transform: scale(0.7) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.rcard-top { padding: 40px 24px 30px; text-align: center; background: radial-gradient(circle at top, rgba(255,69,0,0.2) 0%, transparent 100%); border-bottom: 1px solid rgba(255,255,255,0.08); }
.rcard-top.lose-top { background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.03); }
.rcard-title { font-size: 32px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 15px; }
.rcard-badge { display: inline-block; background: linear-gradient(180deg, #ff7b00 0%, #c42900 100%); color: #fff; font-size: 16px; font-weight: 900; padding: 10px 30px; border-radius: 40px; letter-spacing: 1px; text-transform: uppercase; border: 1px solid #ff9245; }
.rcard-badge.vip-badge { background: linear-gradient(180deg, #ffe566 0%, #d4920e 50%, #7a4e00 100%); border: 1px solid #ffe566; color: #2a1200; animation: vipGlow 2s infinite; }
@keyframes vipGlow { 0%,100% { box-shadow: 0 5px 30px rgba(255,210,0,0.7); } 50% { box-shadow: 0 5px 50px rgba(255,230,0,1); } }
.promo-box { display: none; margin: 16px auto 0; text-align: center; }
.promo-label { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 7px; }
.promo-code { display: inline-block; background: rgba(80,30,0,0.6); border: 1px solid rgba(255,140,0,0.7); border-radius: 10px; padding: 9px 24px; font-size: 20px; font-weight: 900; letter-spacing: 5px; color: #ffaa33; font-family: 'Montserrat', monospace; }
.rcard-bot { padding: 30px 24px 20px; text-align: center; background: rgba(0,0,0,0.4); }
.rcard-text { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 24px; }
.rcard-btn { width: 100%; background: linear-gradient(180deg, #ff4c00 0%, #b22500 100%); color: #fff; font-family: inherit; font-size: 16px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; border: 1px solid #ff7a33; border-radius: 16px; padding: 18px; cursor: pointer; margin-bottom: 15px; }
.kapat-btn { display: block; width: 100%; background: transparent; border: none; color: #6a5a54; font-family: inherit; font-size: 14px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px; cursor: pointer; transition: color 0.2s; }
.kapat-btn:active { color: #fff; }
canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
</style>
</head>
<body>
<div class="bg"></div>
<canvas id="embers" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
<div class="container">
  <div class="logo"><span class="w">BETOR</span><span class="o">SPİN</span><span class="d">.</span></div>
  <div class="logo-line"></div>
  <div class="logo-sub">ŞANS ÇARKI</div>
  <div class="main-title">ÇEVİR & <em>KAZAN!</em></div>
  <div class="wheel-wrap">
    <div class="ring-glow"></div>
    <div class="ring-glow-mask"></div>
    <div class="pointer"><div class="ptr-ball"></div><div class="ptr-tri"></div></div>
    <canvas id="wheel" width="286" height="286"></canvas>
    <canvas id="spotlight" width="286" height="286"></canvas>
  </div>
  <div class="btn-area">
    <button id="spinBtn" onclick="spin()" disabled>
      <div class="btn-body">ÇEVİR</div>
    </button>
  </div>
  <div class="spin-info" id="spinInfo">YÜKLENİYOR...</div>
  <button class="invite-btn" onclick="shareInvite()">Arkadaşını Davet Et <span class="invite-badge">+1 Spin</span></button>
  <div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>
  <div class="no-spin-banner" id="noSpinBanner">
    <div class="ns-title">Bugünkü Hakkını Kullandın!</div>
    <div class="ns-text">Yeni spin hakkın için kalan süre:</div>
    <div class="ns-countdown-wrap">
      <div class="ns-countdown-label">Yenileniyor</div>
      <div class="ns-countdown" id="nsCountdown">00:00:00</div>
    </div>
    <button class="ns-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
    <button class="ns-invite" onclick="shareInvite()">Davet Et → Hemen +1 Spin Kazan</button>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="overlay-rays"></div>
  <div class="rcard">
    <div class="rcard-top" id="rTop">
      <div class="rcard-title" id="rTitle">TEBRİKLER</div>
      <div class="rcard-badge" id="rBadge">100 Freespin</div>
      <div class="promo-box" id="promoBox">
        <div class="promo-label">PROMOKOD</div>
        <div class="promo-code" id="promoCode"></div>
      </div>
    </div>
    <div class="rcard-bot">
      <div class="rcard-text" id="rText">Ödülünü almak için siteye gir!</div>
      <button class="rcard-btn" id="rBtn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
      <button class="kapat-btn" onclick="closeModal()">KAPAT</button>
    </div>
  </div>
</div>
<canvas id="confetti"></canvas>
<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0d0806'); tg.setBackgroundColor('#0d0806'); }
const urlParams = new URLSearchParams(window.location.search);
const USER_ID = parseInt(urlParams.get('user_id')) || tg?.initDataUnsafe?.user?.id || null;
const USER_NAME = tg?.initDataUnsafe?.user?.first_name || '';
const USER_USERNAME = tg?.initDataUnsafe?.user?.username || '';
const ADMIN_ID = 6943377103;

// ── ÇARK DİLİMLERİ ──────────────────────────────────────────────────
const SEGS = [
  { lines:['100 Freespin',''],   bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', win:true,  prize:'100 Freespin',   promo:'BOSFS100GO' },
  { lines:['1 SPİN',''],         bg:'#240e04', stroke:'#ff6600', tc:'#ffffff', win:true,  prize:'1 SPİN',         promo:null         },
  { lines:['100 Freespin',''],   bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', win:true,  prize:'100 Freespin',   promo:'BOSFS100S'  },
  { lines:['1 SPİN',''],         bg:'#240e04', stroke:'#ff6600', tc:'#ffffff', win:true,  prize:'1 SPİN',         promo:null         },
  { lines:['100TL','Bonus Buy'], bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', win:true,  prize:'100TL Bonus Buy',promo:'BOSBYB'     },
  { lines:['100TL','Bonus Buy'], bg:'#1c0d02', stroke:'#ff8c00', tc:'#ffffff', win:true,  prize:'100TL Bonus Buy',promo:'BOSBHB'     },
  { lines:['Kaybettin',''],      bg:'#0a0402', stroke:'#ff1100', tc:'#ffffff', win:false, prize:null,             promo:null         },
  { lines:['VİP',''],            bg:'#1a0e00', stroke:'#ffd700', tc:'#ffd700', win:true,  prize:'VİP',            promo:'BOSBBh',    vip:true },
  { lines:['Kaybettin',''],      bg:'#0a0402', stroke:'#ff1100', tc:'#ffffff', win:false, prize:null,             promo:null         },
];

const N=SEGS.length, ARC=(2*Math.PI)/N;
const cv=document.getElementById('wheel'), ctx=cv.getContext('2d');
const sc=document.getElementById('spotlight'), sctx=sc.getContext('2d');
const CX=143, CY=143, R=138;
let angle=0, spinning=false, spinAllowed=false, countdownInterval=null;

function getSpinKey(){ return `last_spin_${USER_ID||'guest'}`; }
function updateCountdown(){
  const el=document.getElementById('nsCountdown'); if(!el||USER_ID===ADMIN_ID) return;
  let ls=localStorage.getItem(getSpinKey());
  if(!ls){ls=Date.now().toString();localStorage.setItem(getSpinKey(),ls);}
  const diff=new Date(parseInt(ls)+(24*60*60*1000))-new Date();
  if(diff<=0){clearInterval(countdownInterval);countdownInterval=null;checkSpinRight();return;}
  el.textContent=`${String(Math.floor(diff/3600000)).padStart(2,'0')}:${String(Math.floor((diff%3600000)/60000)).padStart(2,'0')}:${String(Math.floor((diff%60000)/1000)).padStart(2,'0')}`;
}
function startCountdown(){updateCountdown();if(countdownInterval)clearInterval(countdownInterval);countdownInterval=setInterval(updateCountdown,1000);}
function stopCountdown(){if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}}

function draw(a,t=0){
  ctx.clearRect(0,0,286,286);
  for(let i=0;i<N;i++){
    const s=a+i*ARC,e=s+ARC,seg=SEGS[i];
    const sg=ctx.createRadialGradient(CX,CY,R*0.3,CX,CY,R);
    sg.addColorStop(0,seg.bg);sg.addColorStop(0.8,'#050201');sg.addColorStop(1,'#000');
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();
    ctx.fillStyle=sg;ctx.fill();
    if(seg.vip){
      const vg=ctx.createRadialGradient(CX,CY,R*0.2,CX,CY,R);
      vg.addColorStop(0,'rgba(255,210,0,0.18)');vg.addColorStop(1,'rgba(255,150,0,0.04)');
      ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();
      ctx.fillStyle=vg;ctx.fill();
    }
  }
  for(let i=0;i<N;i++){
    const a2=a+i*ARC,ex=CX+R*Math.cos(a2),ey=CY+R*Math.sin(a2);
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(ex,ey);
    ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=4;ctx.stroke();
    const lg=ctx.createLinearGradient(CX,CY,ex,ey);
    lg.addColorStop(0,'#5a3d00');lg.addColorStop(0.5,'#ffd900');lg.addColorStop(1,'#ff9900');
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(ex,ey);
    ctx.strokeStyle=lg;ctx.lineWidth=2;ctx.stroke();
  }
  const dg=ctx.createRadialGradient(CX-R*0.35,CY-R*0.35,0,CX,CY,R);
  dg.addColorStop(0,'rgba(255,255,255,0.07)');dg.addColorStop(0.35,'rgba(0,0,0,0)');dg.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.beginPath();ctx.arc(CX,CY,R,0,2*Math.PI);ctx.fillStyle=dg;ctx.fill();
  const irg=ctx.createLinearGradient(CX-40,CY-40,CX+40,CY+40);
  irg.addColorStop(0,'#ffe55c');irg.addColorStop(0.3,'#b37d00');irg.addColorStop(0.6,'#4d3000');irg.addColorStop(1,'#ffc000');
  ctx.beginPath();ctx.arc(CX,CY,42,0,2*Math.PI);ctx.strokeStyle=irg;ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,44,0,2*Math.PI);ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<N;i++){
    const s=a+i*ARC,seg=SEGS[i];
    ctx.save();ctx.translate(CX,CY);ctx.rotate(s+ARC/2);ctx.textAlign='right';
    const ls=seg.lines.filter(l=>l);
    const fs=ls.length>1?11:13;
    ctx.font=`900 ${fs}px 'Montserrat',sans-serif`;
    ctx.shadowColor='rgba(0,0,0,0.95)';ctx.shadowBlur=5;ctx.shadowOffsetX=1;ctx.shadowOffsetY=2;
    if(seg.vip){ctx.fillStyle='#ffd700';ctx.shadowColor='rgba(255,180,0,0.9)';ctx.shadowBlur=8;}
    else{ctx.fillStyle=seg.tc;}
    const lh=fs+5,oy=-(ls.length-1)*lh/2;
    ls.forEach((l,li)=>ctx.fillText(l,R-14,oy+li*lh+fs*0.35));
    ctx.restore();
  }
  const gg=ctx.createLinearGradient(CX-R*0.6,CY-R*0.8,CX+R*0.8,CY+R*0.8);
  gg.addColorStop(0,'rgba(255,255,255,0.22)');gg.addColorStop(0.4,'rgba(255,255,255,0.03)');gg.addColorStop(0.45,'transparent');gg.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(CX,CY,R,0,2*Math.PI);ctx.fillStyle=gg;ctx.fill();
  const dx=R*Math.cos(t),dy=R*Math.sin(t);
  const rg=ctx.createLinearGradient(CX-dx,CY-dy,CX+dx,CY+dy);
  rg.addColorStop(0,'#2e0f00');rg.addColorStop(0.3,'#ffaa00');rg.addColorStop(0.5,'#1a0800');rg.addColorStop(0.8,'#ff5500');rg.addColorStop(1,'#2e0f00');
  ctx.beginPath();ctx.arc(CX,CY,R,0,2*Math.PI);ctx.strokeStyle=rg;ctx.lineWidth=14;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,R-7,0,2*Math.PI);ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,R-8,0,2*Math.PI);ctx.strokeStyle='rgba(255,120,0,0.6)';ctx.lineWidth=1;ctx.stroke();
  for(let j=0;j<36;j++){
    const bA=j*(2*Math.PI/36),bx=CX+(R-3)*Math.cos(bA),by=CY+(R-3)*Math.sin(bA);
    const gl=(Math.sin(t*10+bA*4)+1)/2;
    ctx.beginPath();ctx.arc(bx,by,1.8,0,2*Math.PI);
    ctx.fillStyle=`rgba(255,160,50,${0.4+gl*0.6})`;ctx.shadowColor='#ff7700';ctx.shadowBlur=gl*8;ctx.fill();ctx.shadowBlur=0;
  }
  ctx.shadowColor='rgba(0,0,0,0.95)';ctx.shadowBlur=15;ctx.shadowOffsetX=0;ctx.shadowOffsetY=8;
  const cb=ctx.createRadialGradient(CX-15,CY-15,2,CX,CY,38);
  cb.addColorStop(0,'#552200');cb.addColorStop(0.5,'#170b07');cb.addColorStop(1,'#000');
  ctx.beginPath();ctx.arc(CX,CY,36,0,2*Math.PI);ctx.fillStyle=cb;ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  ctx.save();ctx.translate(CX,CY);ctx.rotate(-a*1.5);
  const cr=ctx.createLinearGradient(-35,-35,35,35);
  cr.addColorStop(0,'#ffcc00');cr.addColorStop(0.5,'#441100');cr.addColorStop(1,'#ff5500');
  ctx.beginPath();ctx.arc(0,0,36,0,2*Math.PI);ctx.strokeStyle=cr;ctx.lineWidth=5;ctx.stroke();
  for(let j=0;j<8;j++){ctx.beginPath();ctx.arc(33*Math.cos(j*Math.PI/4),33*Math.sin(j*Math.PI/4),2.5,0,2*Math.PI);ctx.fillStyle='#ffaa00';ctx.fill();}
  ctx.restore();
  ctx.beginPath();ctx.arc(CX,CY,31,0,2*Math.PI);ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,30,0,2*Math.PI);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.stroke();
  ctx.textAlign='center';ctx.font='900 12.5px Montserrat,sans-serif';
  ctx.shadowColor='rgba(255,100,0,1)';ctx.shadowBlur=8;
  ctx.fillStyle='#ff5500';ctx.fillText('BETOR',CX,CY-3);
  ctx.fillStyle='#ffffff';ctx.fillText('SPİN.',CX,CY+12);
  ctx.shadowColor='transparent';ctx.shadowBlur=0;
}

function drawSpotlight(a,idx,alpha){
  sctx.clearRect(0,0,286,286);if(alpha<=0)return;
  sctx.save();sctx.fillStyle=`rgba(0,0,0,${alpha*0.72})`;
  sctx.beginPath();sctx.arc(CX,CY,R-5,0,2*Math.PI);sctx.fill();
  const s=a+idx*ARC,e=s+ARC;
  sctx.globalCompositeOperation='destination-out';
  sctx.beginPath();sctx.moveTo(CX,CY);sctx.arc(CX,CY,R-5,s,e);sctx.closePath();
  sctx.fillStyle=`rgba(255,255,255,${alpha})`;sctx.fill();sctx.restore();
  sctx.save();sctx.globalCompositeOperation='destination-out';
  sctx.beginPath();sctx.arc(CX,CY,38,0,2*Math.PI);sctx.fill();sctx.restore();
}
function animateSpotlight(a,idx){
  sc.style.opacity='1';let alpha=0,t0=null;
  function frame(ts){if(!t0)t0=ts;alpha=Math.min((ts-t0)/600,1);drawSpotlight(a,idx,alpha);if(alpha<1)requestAnimationFrame(frame);}
  requestAnimationFrame(frame);
}
function clearSpotlight(){sc.style.opacity='0';sctx.clearRect(0,0,286,286);}

async function checkSpinRight(){
  if(!USER_ID){disableSpin();document.getElementById('spinInfo').textContent='KİMLİK BULUNAMADI';return;}
  try{
    const res=await fetch(`/api/check_spin?user_id=${USER_ID}`);
    const data=await res.json();
    if(data.allowed)enableSpin(data.spins);else disableSpin();
  }catch(e){disableSpin();document.getElementById('spinInfo').textContent='BAĞLANTI HATASI';}
}
function enableSpin(spins){
  spinAllowed=true;document.getElementById('spinBtn').disabled=false;
  document.getElementById('spinInfo').textContent=`${spins||1} ÇEVİRME HAKKIN VAR`;
  document.getElementById('noSpinBanner').style.display='none';stopCountdown();
}
function disableSpin(){
  spinAllowed=false;document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinInfo').textContent='BUGÜNKÜ HAKKINI KULLANDIN';
  document.getElementById('noSpinBanner').style.display='block';startCountdown();
}

  if(spinning||!spinAllowed)return;
  spinning=true;spinAllowed=false;clearSpotlight();

      const bd=await res.json();
      if(!bd.ok){document.getElementById('spinInfo').textContent='SPİN HAKKIN YOK';spinning=false;disableSpin();return;}
      targetIdx=bd.segment_index;

  playSpinStart();
  const randomOffset=(Math.random()*0.8+0.1)*ARC;
  const K=Math.ceil(angle/(Math.PI*2))+8+Math.floor(Math.random()*3);
  const finalAngle=-Math.PI/2-(targetIdx*ARC+randomOffset)+(K*2*Math.PI);
  const total=finalAngle-angle,dur=7500,start=angle;let t0=null;
  function frame(ts){

    angle=start+total*easeOut(prog);draw(angle,ts*0.005);checkTick(angle);
    if(prog<1)requestAnimationFrame(frame);else{spinning=false;showResult();startIdle();}
  }
  requestAnimationFrame(frame);
}
