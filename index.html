
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şans Çarkı - Betorspin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Montserrat', sans-serif;
  background: #0d0806;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255,69,0,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,120,0,0.08) 0%, transparent 50%),
    #0d0806;
  z-index: 0;
}

.container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  padding: 30px 16px 40px;
}

.logo { font-size: 30px; font-weight: 900; letter-spacing: 0px; margin-bottom: 4px; text-transform: uppercase; }
.logo .w { color: #fff; }
.logo .o { color: #ff5500; }
.logo .d { color: #ff8c00; }

.logo-line {
  width: 100px; height: 3px;
  background: linear-gradient(90deg, transparent, #ff4500, transparent);
  margin: 10px auto 12px;
}
.logo-sub {
  font-size: 14px; font-weight: 700;
  color: #796e67;
  letter-spacing: 5px; text-transform: uppercase;
  margin-bottom: 24px;
}
.main-title {
  font-size: 38px; font-weight: 900; color: #fff;
  text-align: center; margin-bottom: 30px; line-height: 1.1;
  text-transform: uppercase;
}
.main-title em { font-style: normal; color: #ff5500; }

.wheel-wrap {
  position: relative;
  width: 300px; height: 300px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 30px;
}
.ring-glow {
  position: absolute; inset: -10px; border-radius: 50%;
  background: conic-gradient(#ff4500, #ff8c00, #ffc200, #ff8c00, #ff4500, #cc2200, #ff4500);
  animation: spinRing 5s linear infinite;
  opacity: 0.5;
}
.ring-glow-mask { position: absolute; inset: -5px; border-radius: 50%; background: #0d0806; }
@keyframes spinRing { to { transform: rotate(360deg); } }

#spotlight {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 286px; height: 286px;
  border-radius: 50%; pointer-events: none; z-index: 10;
  opacity: 0; transition: opacity 0.3s;
}

.pointer {
  position: absolute; top: -14px; left: 50%;
  transform-origin: 50% 10px;
  transform: translateX(-50%) rotate(0deg);
  transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)) drop-shadow(0 0 5px rgba(255,69,0,0.5));
}
.pointer.ticking {
  transform: translateX(-50%) rotate(-30deg);
  transition: transform 0.02s ease-out;
}
.ptr-ball {
  width: 20px; height: 20px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff 0%, #ff5500 40%, #5a1100 100%);
  border: 2px solid rgba(255,255,200,0.8);
  margin-bottom: -3px; z-index: 1;
  box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5);
}
.ptr-tri {
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 24px solid #ff4500;
}

canvas#wheel {
  border-radius: 50%; position: relative; z-index: 5;
  box-shadow: 0 0 0 1px #000, 0 15px 40px rgba(0,0,0,0.9), 0 5px 15px rgba(255,69,0,0.2);
}

.btn-area { position: relative; margin-bottom: 14px; width: 100%; max-width: 320px; display: flex; justify-content: center; }

#spinBtn { position: relative; background: none; border: none; cursor: pointer; outline: none; width: 100%; max-width: 280px; }

@keyframes pulseGlow {
  0% { box-shadow: 0 0 20px rgba(255, 76, 0, 0.4), inset 0 2px 2px rgba(255,255,255,0.3); }
  50% { box-shadow: 0 0 50px rgba(255, 100, 0, 0.8), inset 0 2px 2px rgba(255,255,255,0.5); }
  100% { box-shadow: 0 0 20px rgba(255, 76, 0, 0.4), inset 0 2px 2px rgba(255,255,255,0.3); }
}
@keyframes shineBtn {
  0% { transform: rotate(45deg) translateX(-200%); }
  20%, 100% { transform: rotate(45deg) translateX(300%); }
}

.btn-body {
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, #ff5500 0%, #8b1c00 100%);
  color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  font-family: inherit; font-size: 28px; font-weight: 900;
  letter-spacing: 4px; text-transform: uppercase;
  border-radius: 40px; padding: 18px 0;
  border: 2px solid #ffa677;
  animation: pulseGlow 2.5s infinite;
  transition: transform .1s, filter .1s;
  width: 100%;
}
.btn-body::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
  border-radius: 40px 40px 0 0; pointer-events: none;
}
.btn-body::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 50%; height: 200%;
  background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
  transform: rotate(45deg) translateX(-150%);
  animation: shineBtn 5s infinite; pointer-events: none;
}
#spinBtn:active:not(:disabled) .btn-body { transform: translateY(6px); filter: brightness(0.8); }
#spinBtn:disabled .btn-body { opacity: 0.4; cursor: not-allowed; animation: none; box-shadow: none; border-color: transparent; }

.spin-info {
  font-size: 14px; font-weight: 800;
  color: #928b86;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-top: 10px; margin-bottom: 20px;
}
.spin-info::before, .spin-info::after {
  content: ''; display: block;
  width: 7px; height: 7px; border-radius: 50%;
  background: #ff4500; flex-shrink: 0;
}

.invite-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: #1c1817;
  border: 1px solid #322b2a;
  border-radius: 20px;
  padding: 16px 20px;
  color: #fff; font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; width: 100%; max-width: 300px;
  transition: background .15s, border-color .15s;
}
.invite-btn:active { background: #26211f; }
.invite-badge {
  color: #ffffff;
  font-weight: 800;
}

.no-spin-banner {
  display: none;
  margin-top: 18px;
  background: rgba(255,69,0,0.08);
  border: 1px solid rgba(255,69,0,0.2);
  border-radius: 16px;
  padding: 18px 22px;
  text-align: center;
  max-width: 300px;
  width: 100%;
}
.no-spin-banner .ns-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.no-spin-banner .ns-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; margin-bottom: 10px; }

.ns-countdown-wrap { margin-bottom: 12px; }
.ns-countdown-label {
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 4px;
}
.ns-countdown {
  font-size: 22px; font-weight: 900;
  color: #ff4500;
  letter-spacing: 3px;
  text-shadow: 0 0 14px rgba(255,69,0,0.4);
  font-variant-numeric: tabular-nums;
}

.no-spin-banner .ns-btn {
  background: linear-gradient(135deg, #ff4500, #ff6a00);
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 900;
  border: none; border-radius: 12px; padding: 12px 28px;
  cursor: pointer; letter-spacing: 0.5px;
  display: block; width: 100%; margin-bottom: 10px;
}
.no-spin-banner .ns-invite {
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  font-family: inherit; font-size: 13px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 11px 28px;
  cursor: pointer; display: block; width: 100%;
}

.overlay {
  display: none; position: fixed; inset: 0; overflow: hidden;
  background: rgba(0,0,0,0.92);
  z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.overlay.show { display: flex; }

.overlay-rays {
  position: absolute; top: 50%; left: 50%;
  width: 200vw; height: 200vw; max-width: 1000px; max-height: 1000px;
  background: repeating-conic-gradient(rgba(255, 100, 0, 0.12) 0 10deg, transparent 10deg 20deg);
  transform: translate(-50%, -50%) rotate(0deg);
  animation: spinRays 30s linear infinite; pointer-events: none;
  opacity: 0; transition: opacity 0.5s; z-index: 0;
}
.overlay.show .overlay-rays { opacity: 1; }
@keyframes spinRays { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

.rcard {
  position: relative; z-index: 1;
  width: 88%; max-width: 320px;
  background: #18110c;
  border-radius: 20px; overflow: hidden;
  border: 1px solid #2f221c;
  box-shadow: 0 40px 80px rgba(0,0,0,0.8);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
@keyframes popIn {
  from { transform: scale(0.7) translateY(40px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.rcard-top {
  padding: 40px 24px 30px; text-align: center;
  background: radial-gradient(circle at top, rgba(255,69,0,0.15) 0%, transparent 100%);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.rcard-top.lose-top { background: #130c08; border-bottom: 1px solid #1f140e; }

.rcard-title { font-size: 32px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 15px; }
.rcard-badge {
  display: inline-block;
  background: linear-gradient(180deg, #ff5500 0%, #d83b00 100%);
  color: #fff; font-size: 16px; font-weight: 900;
  padding: 10px 30px; border-radius: 40px; letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: 0 0 20px rgba(255,69,0,0.3);
}

.rcard-bot { padding: 30px 24px 20px; text-align: center; background: #130c08; }
.rcard-text { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 24px; }
.rcard-btn {
  width: 100%;
  background: linear-gradient(180deg, #ff4c00 0%, #b22500 100%);
  color: #fff; font-family: inherit; font-size: 16px; font-weight: 900;
  letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid #ff7a33;
  border-radius: 16px; padding: 18px;
  cursor: pointer; box-shadow: 0 10px 20px rgba(255,69,0,0.3);
  margin-bottom: 15px;
}

.kapat-btn {
  display: block; width: 100%;
  background: transparent; border: none;
  color: #6a5a54; font-family: inherit; font-size: 14px; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 10px; cursor: pointer;
  transition: color 0.2s;
}
.kapat-btn:active { color: #fff; }

canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
</style>
</head>
<body>
<div class="bg"></div>
<canvas id="embers" style="position:fixed; inset:0; z-index:0; pointer-events:none;"></canvas>

<div class="container">
  <div class="logo"><span class="w">BETOR</span><span class="o">SPİN</span><span class="d">.</span></div>
  <div class="logo-line"></div>
  <div class="logo-sub">ŞANS ÇARKI</div>
  <div class="main-title">ÇEVİR & <em>KAZAN!</em></div>

  <div class="wheel-wrap">
    <div class="ring-glow"></div>
    <div class="ring-glow-mask"></div>
    <div class="pointer"><div class="ptr-ball"></div><div class="ptr-tri"></div></div>
    <canvas id="wheel" width="286" height="286"></canvas>
    <canvas id="spotlight" width="286" height="286"></canvas>
  </div>

  <div class="btn-area">
    <button id="spinBtn" onclick="spin()" disabled>
      <div class="btn-body">ÇEVİR</div>
    </button>
  </div>

  <div class="spin-info" id="spinInfo">YÜKLENİYOR...</div>

  <button class="invite-btn" onclick="shareInvite()">
    Arkadaşını Davet Et <span class="invite-badge">+1 Spin</span>
  </button>

  <div class="no-spin-banner" id="noSpinBanner">
    <div class="ns-title">Bugünkü Hakkını Kullandın!</div>
    <div class="ns-text">Yeni spin hakkın için kalan süre:</div>
    <div class="ns-countdown-wrap">
      <div class="ns-countdown-label">Yenileniyor</div>
      <div class="ns-countdown" id="nsCountdown">00:00:00</div>
    </div>
    <button class="ns-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
    <button class="ns-invite" onclick="shareInvite()">Davet Et → Hemen +1 Spin Kazan</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-rays"></div>
  <div class="rcard">
    <div class="rcard-top" id="rTop">
      <div class="rcard-title" id="rTitle">TEBRİKLER</div>
      <div class="rcard-badge" id="rBadge">100 Freespin</div>
    </div>
    <div class="rcard-bot">
      <div class="rcard-text" id="rText">Ödülün hesabına yatırıldı!</div>
      <button class="rcard-btn" id="rBtn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
      <button class="kapat-btn" onclick="closeModal()">KAPAT</button>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0d0806'); tg.setBackgroundColor('#0d0806'); }

const urlParams = new URLSearchParams(window.location.search);
const USER_ID = parseInt(urlParams.get('user_id')) || tg?.initDataUnsafe?.user?.id || null;
const USER_NAME = tg?.initDataUnsafe?.user?.first_name || '';
const USER_USERNAME = tg?.initDataUnsafe?.user?.username || '';
const ADMIN_ID = 6943377103;

// ── Çark dilimleri ────────────────────────────────────────────────────
const SEGS = [
  { lines:['100','FREESPIN'],         bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', icon:'', win:true,  prize:'100 Freespin'          },
  { lines:['ÖZEL YATIRIM','BONUSU'], bg:'#240e04', stroke:'#ff6600', tc:'#ffffff', icon:'', win:true,  prize:'Özel Yatırım Bonusu'   },
  { lines:['100₺','BAKİYE'],         bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', icon:'', win:true,  prize:'100₺ Bakiye'            },
  { lines:['KAYBETTİN',''],          bg:'#0a0402', stroke:'#ff1100', tc:'#ffffff', icon:'', win:false, prize:null                    },
  { lines:['100₺','BONUS BUY'],      bg:'#240e04', stroke:'#ff6600', tc:'#ffffff', icon:'', win:true,  prize:'100₺ Bonus Buy'        },
  { lines:['200','FREESPIN'],         bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', icon:'', win:true,  prize:'200 Freespin'          },
  { lines:['VİP','HEDİYE'],          bg:'#240e04', stroke:'#ff6600', tc:'#ffffff', icon:'', win:true,  prize:'VİP Hediye'            },
  { lines:['200₺','BONUS BUY'],      bg:'#140803', stroke:'#ff4c00', tc:'#ffffff', icon:'', win:true,  prize:'200₺ Bonus Buy'        },
  { lines:['KAYBETTİN',''],          bg:'#0a0402', stroke:'#ff1100', tc:'#ffffff', icon:'', win:false, prize:null                    },
  { lines:['+1','SPIN'],             bg:'#240e04', stroke:'#ff6600', tc:'#ffffff', icon:'', win:true,  prize:'+1 Spin'               },
];

const N=SEGS.length, ARC=(2*Math.PI)/N;
const cv=document.getElementById('wheel'), ctx=cv.getContext('2d');
const sc=document.getElementById('spotlight'), sctx=sc.getContext('2d');
const CX=143, CY=143, R=138;
let angle=0, spinning=false, spinAllowed=false;
let countdownInterval=null;

function getSpinKey(){ return `last_spin_${USER_ID || 'guest'}`; }

function updateCountdown() {
  const el = document.getElementById('nsCountdown');
  if (!el) return;
  if(USER_ID === ADMIN_ID) return; // Adminler için sayaca ihtiyaç yok
  
  let lastSpin = localStorage.getItem(getSpinKey());
  
  // Eğer localStorage'da kayıt yoksa ama yine de hakkı kalmamışsa (başka cihazdan girmiş vs),
  // sayacı tam 24 saat sonrasına ayarlıyoruz.
  if (!lastSpin) {
    lastSpin = Date.now().toString();
    localStorage.setItem(getSpinKey(), lastSpin);
  }
  
  const target = new Date(parseInt(lastSpin) + (24 * 60 * 60 * 1000));
  const diff = target - new Date();
  
  if (diff <= 0) { 
    clearInterval(countdownInterval); 
    countdownInterval = null; 
    checkSpinRight(); 
    return; 
  }
  
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  el.textContent = `${h}:${m}:${s}`;
}
function startCountdown() {
  updateCountdown();
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(updateCountdown, 1000);
}
function stopCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function draw(a, t=0) {
  ctx.clearRect(0,0,286,286);
  // 1. Dilim Zeminleri ve Çizgileri
  for(let i=0;i<N;i++){
    const s=a+i*ARC, e=s+ARC, seg=SEGS[i];
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.fillStyle=seg.bg; ctx.fill();
    ctx.strokeStyle=seg.stroke; ctx.lineWidth=1.5; ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a2=a+i*ARC;
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.lineTo(CX+R*Math.cos(a2),CY+R*Math.sin(a2));
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.stroke();
  }

  // 2. 3D BOMBE OLUŞTURUCU KÜRESEL GÖLGE EFEKTİ (DOME EFFECT)
  const domeGrd = ctx.createRadialGradient(CX - R*0.35, CY - R*0.35, 0, CX, CY, R);
  domeGrd.addColorStop(0, 'rgba(255, 255, 255, 0.12)'); 
  domeGrd.addColorStop(0.35, 'rgba(0, 0, 0, 0)');        
  domeGrd.addColorStop(1, 'rgba(0, 0, 0, 0.85)');       
  
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.fillStyle = domeGrd; ctx.fill();

  // 3. YAZILAR (Gölgelerin üstünde parlak durmaları için buraya alındı)
  for(let i=0;i<N;i++){
    const s=a+i*ARC, seg=SEGS[i];
    ctx.save(); ctx.translate(CX,CY); ctx.rotate(s+ARC/2); ctx.textAlign='right';
    const ls=seg.lines.filter(l=>l);
    
    // Orjinal font boyutlarına geri dönüldü taşıp göbeğe girmemesi için
    const fs=ls.length>1?11.5:13.5; 
    ctx.font=`900 ${fs}px 'Montserrat', sans-serif`;
    
    // Metinlere güçlü drop-shadow ile ayrıştırma
    ctx.shadowColor = 'rgba(0,0,0,0.95)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 2;
    
    ctx.fillStyle=seg.tc;
    const lh=fs+4, oy=-(ls.length-1)*lh/2;
    ls.forEach((l,li)=>ctx.fillText(l,R-11,oy+li*lh+fs*0.35));
    ctx.restore();
  }

  // 4. METALİK DIŞ ÇERÇEVE (Hareketli Aydınlatma)
  const dx = R * Math.cos(t), dy = R * Math.sin(t);
  const rimGrd = ctx.createLinearGradient(CX-dx, CY-dy, CX+dx, CY+dy);
  rimGrd.addColorStop(0, '#5a1d00');
  rimGrd.addColorStop(0.25, '#ffaa00'); // Işık yansıması (Glow)
  rimGrd.addColorStop(0.5, '#2e0f00');
  rimGrd.addColorStop(0.75, '#ff5500');
  rimGrd.addColorStop(1, '#5a1d00');
  
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.strokeStyle = rimGrd; ctx.lineWidth = 10; ctx.stroke();

  ctx.beginPath(); ctx.arc(CX, CY, R-5, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(255, 120, 0, 0.35)'; ctx.lineWidth = 1.5; ctx.stroke();

  // 5. MERKEZ GÖBEK (3D Vida)
  ctx.shadowColor = 'rgba(0,0,0,0.95)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 6;
  
  const centerBase = ctx.createRadialGradient(CX-15, CY-15, 2, CX, CY, 38);
  centerBase.addColorStop(0, '#662200');
  centerBase.addColorStop(0.6, '#170b07');
  centerBase.addColorStop(1, '#080402');
  ctx.beginPath(); ctx.arc(CX, CY, 35, 0, 2*Math.PI);
  ctx.fillStyle = centerBase; ctx.fill();
  
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

  const dx2 = 35 * Math.cos(-t), dy2 = 35 * Math.sin(-t);
  const cRim = ctx.createLinearGradient(CX-dx2, CY-dy2, CX+dx2, CY+dy2);
  cRim.addColorStop(0, '#ff9900'); cRim.addColorStop(1, '#330c00');
  ctx.beginPath(); ctx.arc(CX, CY, 35, 0, 2*Math.PI);
  ctx.strokeStyle = cRim; ctx.lineWidth = 4; ctx.stroke();

  ctx.beginPath(); ctx.arc(CX,CY,25,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.stroke();

  ctx.textAlign='center';
  ctx.font='900 11.5px Montserrat, sans-serif';
  ctx.shadowColor = 'rgba(255,100,0,0.6)'; ctx.shadowBlur = 5;
  ctx.fillStyle='#ff5500'; ctx.fillText('BETOR',CX,CY-2);
  ctx.fillStyle='#fff'; ctx.fillText('SPİN.',CX,CY+11);
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
}

function drawSpotlight(a, idx, alpha) {
  sctx.clearRect(0,0,286,286);
  if(alpha<=0) return;
  sctx.save();
  
  // Dış metal rimi maskelemek için yarıçap R-5
  sctx.fillStyle=`rgba(0,0,0,${alpha*0.72})`;
  sctx.beginPath(); sctx.arc(CX,CY,R-5,0,2*Math.PI); sctx.fill();
  
  const s=a+idx*ARC, e=s+ARC;
  
  // Kazanan dilimi kes maskele
  sctx.globalCompositeOperation='destination-out';
  sctx.beginPath(); sctx.moveTo(CX,CY); sctx.arc(CX,CY,R-5,s,e); sctx.closePath();
  sctx.fillStyle=`rgba(255,255,255,${alpha})`; sctx.fill();
  sctx.restore();
  
  // Renkli Vurgu (Spotlight glow)
  sctx.save();
  sctx.globalAlpha=alpha*0.9;
  const seg=SEGS[idx], mid=s+ARC/2;
  const grd=sctx.createRadialGradient(CX+(R*0.6)*Math.cos(mid),CY+(R*0.6)*Math.sin(mid),2,CX+(R*0.6)*Math.cos(mid),CY+(R*0.6)*Math.sin(mid),R*0.5);
  grd.addColorStop(0,seg.tc+'aa'); grd.addColorStop(1,'transparent');
  
  sctx.beginPath(); sctx.moveTo(CX,CY); sctx.arc(CX,CY,R-5,s,e); sctx.closePath();
  sctx.fillStyle=grd; 
  sctx.globalCompositeOperation='source-over'; 
  sctx.fill();
  sctx.restore();

  // En son, merkezdeki vidayı (bolt) tamamen maskeden çıkar
  // Taşan renkli vurguyu da temizlemiş oluruz
  sctx.save();
  sctx.globalCompositeOperation='destination-out';
  sctx.beginPath(); sctx.arc(CX, CY, 38, 0, 2*Math.PI); sctx.fill();
  sctx.restore();
}
function animateSpotlight(a,idx){
  sc.style.opacity='1'; let alpha=0,t0=null;
  function frame(ts){ if(!t0)t0=ts; alpha=Math.min((ts-t0)/600,1); drawSpotlight(a,idx,alpha); if(alpha<1)requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
}
function clearSpotlight(){ sc.style.opacity='0'; sctx.clearRect(0,0,286,286); }

async function checkSpinRight() {
  if(!USER_ID){ disableSpin(); document.getElementById('spinInfo').textContent = 'KİMLİK BULUNAMADI'; return; }
  try {
    const res = await fetch(`/api/check_spin?user_id=${USER_ID}`);
    const data = await res.json();
    if(data.allowed) enableSpin(data.spins);
    else disableSpin();
  } catch(e) { 
    disableSpin(); 
    document.getElementById('spinInfo').textContent = 'BAĞLANTI HATASI';
  }
}

function enableSpin(spins) {
  spinAllowed = true;
  document.getElementById('spinBtn').disabled = false;
  const s = spins || 1;
  document.getElementById('spinInfo').textContent = `${s} ÇEVİRME HAKKIN VAR`;
  document.getElementById('noSpinBanner').style.display = 'none';
  stopCountdown();
}

function disableSpin() {
  spinAllowed = false;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinInfo').textContent = 'BUGÜNKÜ HAKKINI KULLANDIN';
  document.getElementById('noSpinBanner').style.display = 'block';
  startCountdown();
}

checkSpinRight();

async function spin() {
  if(spinning||!spinAllowed) return;
  spinning=true; spinAllowed=false;
  clearSpotlight();
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinInfo').textContent='SONUÇ BEKLENİYOR...';
  cancelAnimationFrame(idleRaf);

  let targetIdx = -1;

  if(USER_ID) {
    try {
      const res = await fetch('/api/use_spin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user_id: USER_ID, name: USER_NAME, username: USER_USERNAME })
      });
      const backendData = await res.json();
      if (!backendData.ok) {
        document.getElementById('spinInfo').textContent = 'SPİN HAKKIN YOK';
        spinning = false;
        disableSpin();
        return;
      }
      targetIdx = backendData.segment_index;
      if (USER_ID !== ADMIN_ID) {
        localStorage.setItem(getSpinKey(), Date.now().toString());
      }
    } catch(e) {
      document.getElementById('spinInfo').textContent = 'BAĞLANTI HATASI';
      spinning = false;
      enableSpin(1);
      return;
    }
  } else {
    // Misafir (Kimlik yok)
    targetIdx = Math.floor(Math.random() * N);
  }

  document.getElementById('spinInfo').textContent='İYİ ŞANSLAR!';
  playSpinStart();
  
  const randomOffset = (Math.random() * 0.8 + 0.1) * ARC;
  const K = Math.ceil(angle / (Math.PI * 2)) + 8 + Math.floor(Math.random() * 3);
  const finalAngle = -Math.PI/2 - (targetIdx * ARC + randomOffset) + (K * 2 * Math.PI);
  const total = finalAngle - angle;

  const dur=7500, start=angle; let t0=null;
  function frame(ts){
    if(!t0) t0=ts;
    const prog=Math.min((ts-t0)/dur,1);
    angle=start+total*easeOut(prog);
    draw(angle, ts * 0.005);
    checkTick(angle);
    if(prog<1) requestAnimationFrame(frame);
    else { spinning=false; showResult(); startIdle(); }
  }
  requestAnimationFrame(frame);
}
function easeOut(t){ return 1-Math.pow(1-t,6); }

function showResult() {
  const norm=((-Math.PI/2-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/ARC)%N, seg=SEGS[idx];
  animateSpotlight(angle,idx);
  
  if(seg.win){
    const rTitle = document.getElementById('rTitle');
    const rText = document.getElementById('rText');
    const rBtn = document.getElementById('rBtn');

    document.getElementById('rTop').className='rcard-top';
    document.getElementById('rBadge').style.display='inline-block';
    document.getElementById('rBadge').textContent=seg.prize;
    
    if (seg.prize === '+1 Spin') {
      rTitle.textContent = 'EKSTRA ŞANS!';
      rText.innerHTML = 'Harika! Çarkı çevirmek için anında<br><b>+1 HAK</b> daha kazandın.';
      rBtn.textContent = 'HEMEN TEKRAR ÇEVİR';
      rBtn.onclick = closeModal;
    } else {
      rTitle.textContent = 'TEBRİKLER';
      rText.textContent = 'Ödülün hesabına yatırıldı!';
      rBtn.textContent = 'SİTEYE GİT VE OYNA';
      rBtn.onclick = goSite;
    }

    confetti(); playWin();
    // tg.sendData kaldırıldı, backend zaten DB'ye işleyip mesaj attı
  } else {
    document.getElementById('rTop').className='rcard-top lose-top';
    document.getElementById('rTitle').textContent='OLMADI';
    document.getElementById('rBadge').style.display='inline-block';
    document.getElementById('rBadge').textContent='KAYIP';
    document.getElementById('rText').textContent='Yarın tekrar dene veya davet et!';
    document.getElementById('rBtn').textContent='SİTEYE GİT VE OYNA';
    document.getElementById('rBtn').onclick = goSite;
    playLose();
    // tg.sendData kaldırıldı
  }
  setTimeout(()=>document.getElementById('overlay').classList.add('show'), 800);
  setTimeout(()=>{ 
    // Çark durduktan sonra Backend'e bonus ya da admin hakkımız var mı diye tekrar soruyoruz
    checkSpinRight(); 
  }, 1000);
}

  if(!USER_ID){ goSiteDirect(); return; }

  else window.open('https://cutt.ly/7tF5Ow3K','_blank');

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

function confetti(){
  const cc=document.getElementById('confetti');
  cc.width=window.innerWidth; cc.height=window.innerHeight;
  const cx2=cc.getContext('2d');
  const cols=['#ff4500','#ff8c00','#ffc200','#ffffff','#ff6b6b','#4a8fff','#22ee66'];
  const ps=Array.from({length:110},()=>({
    x:Math.random()*cc.width, y:-20-Math.random()*80,
    w:5+Math.random()*8, h:3+Math.random()*4,
    c:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-.5)*5, vy:3+Math.random()*4,
    rot:Math.random()*360, rs:(Math.random()-.5)*10, a:1
  }));
  let raf;
  function go(){
    cx2.clearRect(0,0,cc.width,cc.height); let alive=false;
    ps.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vy+=0.06;
      if(p.y<cc.height+20) alive=true; else p.a=Math.max(0,p.a-.02);
      cx2.save(); cx2.globalAlpha=Math.max(0,p.a);
      cx2.translate(p.x,p.y); cx2.rotate(p.rot*Math.PI/180);
      cx2.fillStyle=p.c; cx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cx2.restore();
    });
    alive?raf=requestAnimationFrame(go):cx2.clearRect(0,0,cc.width,cc.height);
  }
  cancelAnimationFrame(raf); go();
  setTimeout(()=>{cancelAnimationFrame(raf);cx2.clearRect(0,0,cc.width,cc.height);},5000);
}

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getACtx(){ if(!actx) actx=new AudioCtx(); return actx; }
function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); }

function animatePointerTick() {
  const ptr = document.querySelector('.pointer');
  if(!ptr) return;
  ptr.classList.remove('ticking');
  void ptr.offsetWidth; // Zıplamayı sıfırla (reflow)
  ptr.classList.add('ticking');
  clearTimeout(ptr.tickTimeout);
  ptr.tickTimeout = setTimeout(() => ptr.classList.remove('ticking'), 30);
}

function playTick(){
  try{
    // Premium, tok bir casino çarkı "pıt" tıklaması (Kulak tırmalamayan plastik sentezi)
    const a=getACtx(), t=a.currentTime;
    const o=a.createOscillator(), g=a.createGain();
    o.type='sine'; 
    
    // Sesin başlarken çok kısa süreli tizden kalına inmesi tok bir 'tık' hissi yaratır.
    o.frequency.setValueAtTime(700, t); 
    o.frequency.exponentialRampToValueAtTime(120, t+0.02);
    
    // Sesi 0.03 saniye içinde hızla sönümlendirerek keskin vurma hissi veriyoruz
    g.gain.setValueAtTime(0.35, t); 
    g.gain.exponentialRampToValueAtTime(0.001, t+0.03);
    
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+0.04);
  }catch(e){}
}
function playWin(){
  try{
    const a=getACtx(),notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g); g.connect(a.destination); o.type='triangle';
      const t=a.currentTime+i*0.13;
      o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.25);
    });
    vibrate([50,30,80,30,150]);
  }catch(e){}
}
function playLose(){
  try{
    const a=getACtx(),notes=[300,220];
    notes.forEach((freq,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g); g.connect(a.destination); o.type='sawtooth';
      const t=a.currentTime+i*0.18;
      o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t); o.stop(t+0.3);
    });
    vibrate([100,50,100]);
  }catch(e){}
}
function playSpinStart(){
  try{
    const a=getACtx(),o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type='sine';
    o.frequency.setValueAtTime(200,a.currentTime); o.frequency.exponentialRampToValueAtTime(600,a.currentTime+0.3);
    g.gain.setValueAtTime(0.15,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.3);
    o.start(); o.stop(a.currentTime+0.3);
    vibrate([30,20,30]);
  }catch(e){}
}

let lastTickProgress=null;
const TICK_INTERVAL=(2*Math.PI)/10;
function checkTick(a){
  // Math.PI/2 = Çarkın tepe noktasının ofseti
  const progress = (a + Math.PI/2) / TICK_INTERVAL;
  if(lastTickProgress === null) lastTickProgress = Math.floor(progress);
  
  // Çarkın çizgisi her tepe noktasını kusursuz vurduğunda işlemi (Tık'ı) tetikle
  while (progress - lastTickProgress >= 1) {
    lastTickProgress++;
    playTick(); vibrate(8); animatePointerTick();
  }
}

let idleRaf=null;
function startIdle(){
  if(spinning) return;
  const ts = performance.now();
  draw(angle, ts*0.0015);
  idleRaf = requestAnimationFrame(startIdle);
}
startIdle();

function initEmbers() {
  const c = document.getElementById('embers');
  if(!c) return;
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const ps = Array.from({length: 40}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*2+0.5, vx: (Math.random()-0.5)*0.5, vy: -Math.random() - 0.2,
    a: Math.random(), da: (Math.random()-0.5)*0.02
  }));
  function b(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
      if(p.a<=0) p.da=Math.abs(p.da); if(p.a>=1) p.da=-Math.abs(p.da);
      if(p.y < -10) { p.y = c.height+10; p.x = Math.random()*c.width; }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 2*Math.PI);
      ctx.fillStyle = `rgba(255, 100, 0, ${p.a})`;
      ctx.shadowBlur = 6; ctx.shadowColor = '#ff4500';
      ctx.fill(); ctx.shadowBlur = 0;
    });
    requestAnimationFrame(b);
  }
  b();
}
initEmbers();
window.addEventListener('resize', () => { 
  const c=document.getElementById('embers'); 
  if(c){ c.width=window.innerWidth; c.height=window.innerHeight; }
});
