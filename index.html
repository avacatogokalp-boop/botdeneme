<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Betorspin Hazine Kasası</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Oswald', sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* Arka Plan Atmosferi */
.bg-glow {
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 50% 50%, #2a0000 0%, #000 70%),
    url('https://www.transparenttextures.com/patterns/dark-metal.png'); /* Metal dokusu */
  z-index: 0;
}

.container {
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px; position: relative; z-index: 1;
}

.main-title {
  font-size: 36px; font-weight: 700; text-transform: uppercase;
  margin-bottom: 30px; letter-spacing: 2px;
  text-align: center; line-height: 1.1;
}
.main-title span {
  color: #ff4500; text-shadow: 0 0 15px rgba(255,69,0,0.6);
}

/* 🔒 KASA ALANI 🔒 */
.vault-wrap {
  position: relative;
  width: 280px; height: 320px;
  margin-bottom: 30px;
  display: flex; align-items: center; justify-content: center;
}

/* Kasa Gövdesi */
.vault-body {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #2a2a2a 0%, #111 100%);
  border: 10px solid #333; border-radius: 20px;
  box-shadow: 
    0 20px 50px rgba(0,0,0,0.9),
    inset 0 0 30px rgba(255,69,0,0.1);
  display: flex; align-items: center; justify-content: center;
}

/* Kasa Kapağı */
.vault-door {
  position: absolute; inset: 15px;
  background: linear-gradient(135deg, #333 0%, #1a1a1a 100%);
  border: 6px solid #444; border-radius: 12px;
  transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s;
  z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* Anahtar Deliği */
.keyhole {
  width: 50px; height: 50px;
  background: #000; border-radius: 50%;
  border: 4px solid #555;
  box-shadow: inset 0 0 10px rgba(255,69,0,0.3);
  position: relative; margin-bottom: 20px;
}
.keyhole::before {
  content: ''; position: absolute; top: 10px; left: 20px;
  width: 10px; height: 20px; background: #555; border-radius: 2px;
}
.keyhole::after {
  content: ''; position: absolute; top: 25px; left: 15px;
  width: 20px; height: 10px; background: #555; border-radius: 2px;
}

/* Kasa Kolu (Dönen Tekerlek) */
.vault-handle {
  width: 100px; height: 100px;
  background: radial-gradient(circle at 35% 35%, #555 0%, #222 100%);
  border-radius: 50%; border: 8px solid #444;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  position: relative;
  transition: transform 1s;
}
.vault-handle::before, .vault-handle::after {
  content: ''; position: absolute; background: #444; border-radius: 4px;
}
.vault-handle::before { top: 10px; bottom: 10px; left: 42px; width: 16px; }
.vault-handle::after { left: 10px; right: 10px; top: 42px; height: 16px; }

/* İçerideki Ödül (Kapak Açılınca Görünür) */
.vault-interior {
  position: absolute; inset: 25px;
  background: radial-gradient(circle at 50% 50%, #ff8c00 0%, #aa4400 100%);
  border-radius: 10px; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 60px; opacity: 0; transition: opacity 0.5s 1s;
}

/* 🗝️ ANAHTAR 🗝️ */
.key-wrap {
  position: absolute; bottom: -60px; left: 50%;
  transform: translateX(-50%);
  cursor: pointer; z-index: 10;
  transition: transform 0.3s, opacity 0.3s;
}
.key-icon {
  width: 80px; filter: drop-shadow(0 0 10px #ff4500);
}
.key-wrap:hover { transform: translateX(-50%) scale(1.1); }

/* 💫 ANİMASYONLAR 💫 */

/* 1. Titreşim (Sallanma) */
@keyframes shake {
  10%, 90% { transform: translate3d(-2px, 0, 0); }
  20%, 80% { transform: translate3d(4px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
  40%, 66% { transform: translate3d(6px, 0, 0); }
}
.shake { animation: shake 0.82s cubic-bezier(.36,.07,.19,.97) both; }

/* 2. Anahtarın Deliğe Girmesi */
@keyframes keyInsert {
  0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -150px) scale(0.6); opacity: 1; }
  100% { transform: translate(-50%, -170px) scale(0.3); opacity: 0; }
}
.key-insert { animation: keyInsert 1.2s forwards; }

/* 3. Kapak Açılma Sınıfı */
.vault-open .vault-door {
  transform: rotateY(-110deg); /* Kapağı yana aç */
  opacity: 0.3; /* Hafif şeffaflaştır */
  transform-origin: left center; /* Soldan menteşeli */
}
.vault-open .vault-interior { opacity: 1; } /* Ödülü göster */
.vault-open .vault-handle { transform: rotate(180deg); } /* Kol dönsün */


/* 🔘 BUTON 🔘 */
#openBtn {
  border: none; background: none; cursor: pointer;
  margin-top: 10px; transition: 0.2s;
}
.btn-body {
  background: linear-gradient(180deg, #ff4500 0%, #b33000 100%);
  padding: 15px 50px; border-radius: 50px;
  color: #fff; font-size: 22px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  box-shadow: 0 6px 0 #661c00, 0 10px 25px rgba(255,69,0,0.4);
}
#openBtn:active:not(:disabled) .btn-body { transform: translateY(4px); box-shadow: 0 2px 0 #661c00; }
#openBtn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

/* 📊 İSTATİSTİK PANELİ (MODAL) 📊 */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.overlay.show { display: flex; }

.modal {
  background: #111; border: 3px solid #ff4500; border-radius: 30px;
  width: 88%; max-width: 320px; text-align: center;
  padding: 40px 25px; box-shadow: 0 0 60px rgba(255,69,0,0.4);
  transform: scale(0.8); opacity: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.overlay.show .modal { transform: scale(1); opacity: 1; }

.modal h2 { font-size: 32px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; color: #fff; }
.prize-box {
  background: #fff; color: #ff4500;
  font-size: 36px; font-weight: 700;
  padding: 15px; border-radius: 15px;
  margin: 25px 0; box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
.modal-btn {
  background: linear-gradient(135deg, #ff4500, #ff6a00);
  color: #fff; border: none; padding: 18px; width: 100%;
  border-radius: 15px; font-size: 20px; font-weight: 700;
  cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">
  <h1 class="main-title">BETOR<span>SPIN</span><br>HAZİNE KASASI</h1>

  <div class="vault-wrap" id="vaultWrap">
    <div class="vault-body">
      <div class="vault-interior" id="vaultInterior">🎁</div>
      
      <div class="vault-door">
        <div class="keyhole"></div>
        <div class="vault-handle"></div>
      </div>
    </div>

    <div class="key-wrap" id="keyWrap" onclick="startOpeningSequence()">
      <img src="https://i.ibb.co/pP6m8v4/pointer.png" class="key-icon" alt="anahtar">
      </div>
  </div>

  <button id="openBtn" onclick="startOpeningSequence()" disabled>
    <div class="btn-body">KASAYI AÇ</div>
  </button>
  
  <p id="spinInfo" style="color: #666; margin-top: 15px; font-weight: 600;">Yükleniyor...</p>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">KASA AÇILDI!</h2>
    <p style="color: #aaa;">İçinden çıkan büyük ödül:</p>
    <div class="prize-box" id="modalPrize">---</div>
    <button class="modal-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
  </div>
</div>

<script>
// Telegram WebApp Ayarları
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); }

// Ödül Havuzu (Çark ile aynı mantık, ağırlıklı rastgele yapabilirsin)
const PRIZES = [
  '100 Freespin', 'Yatırım Bonusu', '100₺ Bakiye', 'VİP Hediye',
  'PAS', '100₺ Bonus Buy', '200 Freespin', '200₺ Bonus Buy'
];

let canOpen = false;
let opening = false;

// 🔥 KASA AÇMA SEKANSINI BAŞLATAN ANA FONKSİYON 🔥
function startOpeningSequence() {
  if (!canOpen || opening) return;
  opening = true;
  canOpen = false;
  document.getElementById('openBtn').disabled = true;
  document.getElementById('spinInfo').textContent = "Şifre çözülüyor...";

  // 1. Aşama: Anahtar Deliğe Girer
  const key = document.getElementById('keyWrap');
  key.classList.add('key-insert');
  playKeySound();

  // 2. Aşama: Kasa Titrer (Şifre deneniyor efekti)
  setTimeout(() => {
    const vault = document.getElementById('vaultWrap');
    vault.classList.add('shake');
    playShakeSound();
    vibrate([100, 50, 100, 50, 200]); // Güçlü titreşim
  }, 1200);

  // 3. Aşama: Kasa Kolu Döner ve Kapak Açılır
  setTimeout(() => {
    const vault = document.getElementById('vaultWrap');
    vault.classList.remove('shake');
    vault.classList.add('vault-open');
    playOpenSound();
    vibrate(500); // Uzun titreşim (açılma anı)
  }, 2500);

  // 4. Aşama: Sonuç Ekranı Gelir
  setTimeout(() => {
    showResult();
  }, 4000);
}

// Sonuç Ekranını Göster
function showResult() {
  // Rastgele ödül seç (Backend entegrasyonu buraya gelecek)
  const isWin = Math.random() > 0.3; // %70 kazanma şansı
  const prize = isWin ? PRIZES[Math.floor(Math.random() * PRIZES.length)] : 'KAYBETTİN';
  
  const interior = document.getElementById('vaultInterior');
  interior.textContent = isWin ? '💰' : '😐'; // İçerideki ikonu değiştir

  document.getElementById('modalPrize').textContent = isWin ? prize : 'BOŞ ÇIKTI';
  document.getElementById('modalTitle').textContent = isWin ? 'TEBRİKLER!' : 'ÜZGÜNÜZ';
  
  if(isWin) playWinSound(); else playLoseSound();
  
  document.getElementById('overlay').classList.add('show');
}

function goSite() {
  window.open('https://cutt.ly/7tF5Ow3K', '_blank');
}

// --- SES VE TİTREŞİM EFEKTLERİ (KULLANICI DENEYİMİ İÇİN) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx() { if (!actx) actx = new AudioCtx(); return actx; }

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); }

// Metalik Anahtar Sesi
function playKeySound() {
  try {
    const a = getACtx(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination); o.type = 'sine';
    o.frequency.setValueAtTime(800, a.currentTime); o.frequency.exponentialRampToValueAtTime(200, a.currentTime + 0.1);
    g.gain.setValueAtTime(0.2, a.currentTime); g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.1);
    o.start(); o.stop(a.currentTime + 0.1);
  } catch(e) {}
}

// Derin Titreşim Sesi
function playShakeSound() {
  try {
    const a = getACtx(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination); o.type = 'sawtooth';
    o.frequency.setValueAtTime(100, a.currentTime); o.frequency.linearRampToValueAtTime(50, a.currentTime + 0.8);
    g.gain.setValueAtTime(0.3, a.currentTime); g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.8);
    o.start(); o.stop(a.currentTime + 0.8);
  } catch(e) {}
}

// Kasa Açılma Sesi (Hava basıncı efekti)
function playOpenSound() {
  try {
    const a = getACtx(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination); o.type = 'triangle';
    o.frequency.setValueAtTime(40, a.currentTime); o.frequency.linearRampToValueAtTime(200, a.currentTime + 1.2);
    g.gain.setValueAtTime(0.4, a.currentTime); g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 1.2);
    o.start(); o.stop(a.currentTime + 1.2);
  } catch(e) {}
}

function playWinSound() { /* ... (eski kodla aynı) ... */ }
function playLoseSound() { /* ... (eski kodla aynı) ... */ }

// --- SUNUCU ENTEGRASYONU (main.py ile konuşan kısım) ---
// Bot simülasyonu için 1 saniye sonra hakkı aktif et
setTimeout(() => {
  canOpen = true;
  document.getElementById('openBtn').disabled = false;
  document.getElementById('spinInfo').textContent = "1 Kasa Anahtarın Var! 🔑";
  vibrate(100); // Kullanıcıya haber ver
}, 1500);

// Not: Gerçek backend entegrasyonu için startOpeningSequence fonksiyonunun
// başına /api/use_spin gibi bir fetch isteği atman gerekir.
</script>
</body>
</html>
