<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Premium Fortune - Betorspin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

body { background: #050505; min-height: 100vh; overflow: hidden; color: #fff; }

/* Ultra-Premium Background */
.bg {
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 50% 40%, rgba(255, 69, 0, 0.15) 0%, transparent 65%),
    radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.01) 0%, transparent 30%),
    #050505;
  z-index: 0;
}

.container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px;
}

/* Elegant Typography */
.logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
.logo .o { color: #ff4500; text-shadow: 0 0 15px rgba(255,69,0,0.5); }
.logo-sub {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3);
  letter-spacing: 6px; text-transform: uppercase; margin-bottom: 30px;
}

.main-title {
  font-size: 34px; font-weight: 900; text-align: center; margin-bottom: 40px;
  background: linear-gradient(180deg, #fff 0%, #888 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Wheel Master Design */
.wheel-wrap {
  position: relative; width: 320px; height: 320px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 45px;
}

.wheel-outer-ring {
  position: absolute; inset: -12px; border-radius: 50%;
  background: linear-gradient(145deg, #1a1a1a, #000);
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.05);
  z-index: 1;
}

/* Pointer Design */
.pointer {
  position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
  z-index: 30; filter: drop-shadow(0 0 10px rgba(255,69,0,0.5));
}
.ptr-head {
  width: 24px; height: 30px; background: #ff4500;
  clip-path: polygon(50% 100%, 0 0, 100% 0);
  background: linear-gradient(180deg, #ff8c00, #ff4500);
}

canvas#wheel {
  border-radius: 50%; position: relative; z-index: 10;
  border: 4px solid #111;
}

/* Premium Spin Button */
.btn-area { position: relative; margin-top: 10px; }
#spinBtn {
  background: linear-gradient(180deg, #ff6a00 0%, #d42a00 100%);
  border: none; border-radius: 12px;
  padding: 20px 80px; color: #fff;
  font-size: 20px; font-weight: 800; letter-spacing: 4px;
  cursor: pointer; position: relative; overflow: hidden;
  box-shadow: 0 10px 30px rgba(212, 42, 0, 0.3), inset 0 2px 2px rgba(255,255,255,0.4);
  transition: all 0.2s ease;
}
#spinBtn:active { transform: translateY(4px); box-shadow: 0 5px 15px rgba(212, 42, 0, 0.4); }
#spinBtn:disabled { filter: grayscale(1); opacity: 0.3; }

/* Info Text */
.spin-info {
  margin-top: 25px; font-size: 12px; color: rgba(255,255,255,0.4);
  letter-spacing: 1px; text-transform: uppercase;
}

/* Overlay & Results */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px);
}
.overlay.show { display: flex; }
.rcard {
  width: 85%; max-width: 320px; background: #0f0f0f; border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.05); text-align: center; overflow: hidden;
}
.rcard-top { padding: 40px 20px; background: radial-gradient(circle at 50% 0%, rgba(255,69,0,0.15), transparent); }
.rcard-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 15px; }
.rcard-prize { font-size: 32px; font-weight: 900; color: #ff4500; margin-bottom: 25px; }
.rcard-btn {
  width: 100%; padding: 20px; background: #fff; color: #000;
  border: none; font-weight: 800; cursor: pointer; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="container">
  <div class="logo">BETOR<span class="o">SPIN</span></div>
  <div class="logo-sub">PREMIUM FORTUNE</div>
  <h1 class="main-title">GÜNLÜK ŞANS</h1>

  <div class="wheel-wrap">
    <div class="wheel-outer-ring"></div>
    <div class="pointer"><div class="ptr-head"></div></div>
    <canvas id="wheel" width="300" height="300"></canvas>
  </div>

  <div class="btn-area">
    <button id="spinBtn" onclick="spin()" disabled>ÇEVİR</button>
  </div>
  <div class="spin-info" id="spinInfo">SİSTEM BAĞLANTISI KURULUYOR</div>
</div>

<div class="overlay" id="overlay">
  <div class="rcard">
    <div class="rcard-top">
      <div class="rcard-title" id="rTitle">SONUÇ</div>
      <div class="rcard-prize" id="rPrize">-</div>
      <p id="rText" style="color:rgba(255,255,255,0.5); font-size:14px; margin-bottom:20px;">Ödülünüz hesabınıza tanımlanmıştır.</p>
    </div>
    <button class="rcard-btn" onclick="goSite()">DEVAM ET</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#050505'); tg.setBackgroundColor('#050505'); }

const SEGS = [
  { t: '100 FREESPIN',      bg: '#080808', c: '#ff4500', win: true },
  { t: 'YATIRIM BONUSU',    bg: '#111111', c: '#ffffff', win: true },
  { t: '100₺ BAKİYE',       bg: '#080808', c: '#ff4500', win: true },
  { t: 'VİP HEDİYE',        bg: '#111111', c: '#ffffff', win: true },
  { t: 'TEKRAR DENE',       bg: '#050505', c: '#444444', win: false },
  { t: '100₺ BONUS BUY',    bg: '#080808', c: '#ff4500', win: true },
  { t: '200 FREESPIN',      bg: '#111111', c: '#ffffff', win: true },
  { t: 'TEKRAR DENE',       bg: '#050505', c: '#444444', win: false },
  { t: '200₺ BONUS BUY',    bg: '#080808', c: '#ff4500', win: true },
  { t: 'TEKRAR DENE',       bg: '#050505', c: '#444444', win: false }
];

const cv = document.getElementById('wheel'), ctx = cv.getContext('2d');
const N = SEGS.length, ARC = (Math.PI * 2) / N;
let angle = 0, spinning = false;

function draw(a) {
  ctx.clearRect(0,0,300,300);
  const CX = 150, CY = 150, R = 145;

  SEGS.forEach((s, i) => {
    const sA = a + i * ARC, eA = sA + ARC;
    
    // Dilim
    ctx.beginPath(); ctx.moveTo(CX, CY); ctx.arc(CX, CY, R, sA, eA);
    ctx.fillStyle = s.bg; ctx.fill();
    
    // Premium Inner Shadow
    const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, R);
    g.addColorStop(0.7, 'transparent');
    g.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = g; ctx.fill();

    // Metin
    ctx.save(); ctx.translate(CX, CY); ctx.rotate(sA + ARC/2);
    ctx.textAlign = 'right'; ctx.fillStyle = s.c;
    ctx.font = '900 11px sans-serif';
    ctx.fillText(s.t, R - 20, 4);
    ctx.restore();
  });

  // Center Hub
  const h = ctx.createRadialGradient(CX, CY, 0, CX, CY, 40);
  h.addColorStop(0, '#222'); h.addColorStop(1, '#000');
  ctx.beginPath(); ctx.arc(CX, CY, 40, 0, Math.PI*2);
  ctx.fillStyle = h; ctx.fill();
  ctx.strokeStyle = '#ff4500'; ctx.lineWidth = 2; ctx.stroke();
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  
  const total = (8 + Math.random() * 5) * Math.PI * 2;
  const start = Date.now(), dur = 5000;

  function animate() {
    const now = Date.now(), p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 4);
    angle += ease * 0.5; 
    draw(angle);
    if (p < 1) requestAnimationFrame(animate);
    else finishSpin();
  }
  animate();
}

function finishSpin() {
  spinning = false;
  const norm = ((-Math.PI/2 - angle) % (Math.PI*2) + (Math.PI*2)) % (Math.PI*2);
  const idx = Math.floor(norm / ARC) % N;
  const res = SEGS[idx];

  document.getElementById('rPrize').textContent = res.t;
  document.getElementById('rTitle').textContent = res.win ? 'TEBRİKLER' : 'KISMET DEĞİLMİŞ';
  document.getElementById('overlay').classList.add('show');
}

function goSite() {
  location.reload(); // Örnek aksiyon
}

// Başlangıç
draw(0);
setTimeout(() => {
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('spinInfo').textContent = 'SİSTEM HAZIR - ÇEVİREBİLİRSİN';
}, 1500);
</script>
</body>
</html>
