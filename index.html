<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Betorspin Şans Çarkı</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Oswald', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

.container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; z-index: 1; }

/* Arka Plan Efekti */
.bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #220000 0%, #000 70%); z-index: 0; }

.main-title { font-size: 32px; font-weight: 600; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
.main-title span { color: #ff4500; text-shadow: 0 0 10px rgba(255,69,0,0.5); }

/* Çark Tasarımı */
.wheel-wrap { position: relative; width: 320px; height: 320px; margin-bottom: 30px; }
.outer-ring { position: absolute; inset: -10px; border-radius: 50%; border: 4px solid #333; box-shadow: 0 0 20px rgba(255,69,0,0.2); }
.pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 40px; filter: drop-shadow(0 0 5px #ff4500); }

canvas#wheel { border-radius: 50%; border: 6px solid #1a1a1a; box-shadow: 0 0 40px rgba(0,0,0,0.8); }

/* Buton Tasarımı */
#spinBtn { border: none; background: none; cursor: pointer; margin-top: 10px; }
.btn-body { background: linear-gradient(180deg, #ff4500 0%, #b33000 100%); padding: 15px 60px; border-radius: 50px; color: #fff; font-size: 22px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 6px 0 #661c00, 0 12px 20px rgba(255,69,0,0.3); transition: 0.1s; }
#spinBtn:active:not(:disabled) .btn-body { transform: translateY(4px); box-shadow: 0 2px 0 #661c00; }
#spinBtn:disabled { opacity: 0.5; filter: grayscale(1); }

/* Modal Tasarımı */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.overlay.show { display: flex; }
.modal { background: #111; border: 2px solid #ff4500; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; padding: 40px 20px; box-shadow: 0 0 50px rgba(255,69,0,0.3); }
.modal h2 { font-size: 28px; margin-bottom: 10px; }
.prize-box { background: #fff; color: #ff4500; font-size: 30px; font-weight: 600; padding: 10px; border-radius: 15px; margin: 20px 0; }
.modal-btn { background: #ff4500; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
    <h1 class="main-title">BETOR<span>SPIN</span></h1>
    <div class="wheel-wrap">
        <div class="outer-ring"></div>
        <img src="https://i.ibb.co/pP6m8v4/pointer.png" class="pointer" alt="pointer">
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    <button id="spinBtn" onclick="spin()">
        <div class="btn-body">ÇEVİR</div>
    </button>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <h2 id="modalTitle">TEBRİKLER!</h2>
        <div class="prize-box" id="modalPrize">---</div>
        <button class="modal-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
    </div>
</div>

<script>
const SEGS = [
  { text:'100 FS',        bg:'#1a2a44', p:'100 Freespin' },
  { text:'BONUS',         bg:'#c44d00', p:'Yatırım Bonusu' },
  { text:'100₺ NAKİT',    bg:'#1e5a32', p:'100₺ Bakiye' },
  { text:'VİP HEDİYE',    bg:'#5d2a8a', p:'VİP Hediye' },
  { text:'TEKRAR DENE',   bg:'#111111', p:null },
  { text:'100₺ B.BUY',    bg:'#d48c00', p:'100₺ Bonus Buy' },
  { text:'200 FS',        bg:'#1245a8', p:'200 Freespin' },
  { text:'TEKRAR DENE',   bg:'#111111', p:null },
  { text:'200₺ B.BUY',    bg:'#a81212', p:'200₺ Bonus Buy' },
  { text:'TEKRAR DENE',   bg:'#111111', p:null }
];

const cv=document.getElementById('wheel'), ctx=cv.getContext('2d'), N=SEGS.length, ARC=(2*Math.PI)/N;
let angle=0, spinning=false;

function draw() {
  ctx.clearRect(0,0,320,320);
  for(let i=0; i<N; i++) {
    const s = angle + i * ARC, e = s + ARC;
    // Dilim
    ctx.beginPath(); ctx.moveTo(160,160); ctx.arc(160,160,155,s,e);
    ctx.fillStyle = SEGS[i].bg; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    // Yazı
    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(s + ARC/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = '600 16px Oswald';
    ctx.fillText(SEGS[i].text, 145, 6);
    ctx.restore();
  }
}
draw();

function spin() {
  if(spinning) return;
  spinning=true;
  const total = (10 + Math.random()*5) * 2 * Math.PI;
  const start = Date.now(), dur = 5000;
  
  function frame() {
    const p = (Date.now() - start) / dur;
    const ease = 1 - Math.pow(1 - p, 4);
    angle += (total * (1 - ease) * 0.1); 
    draw();
    if(p < 1) requestAnimationFrame(frame);
    else finish();
  }
  frame();
}

function finish() {
  spinning = false;
  const norm = ((-Math.PI/2 - angle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  const idx = Math.floor(norm / ARC) % N;
  const res = SEGS[idx];
  
  document.getElementById('modalPrize').textContent = res.p ? res.p : 'KAYBETTİN';
  document.getElementById('modalTitle').textContent = res.p ? 'TEBRİKLER!' : 'ÜZGÜNÜZ';
  document.getElementById('overlay').classList.add('show');
}

function goSite() { window.open('https://cutt.ly/7tF5Ow3K', '_blank'); }
</script>
</body>
</html>
