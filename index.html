<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şans Çarkı - Betorspin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: radial-gradient(circle at 50% 30%, #2a2d34 0%, #0d0f12 70%, #050608 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: #fff;
}

.bg {
  position: fixed; inset: 0;
  background: transparent;
  z-index: 0;
}

.container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  padding: 28px 16px 40px;
}

.logo { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
.logo .w { color: #fff; }
.logo .o { color: #b87333; } /* Premium Bakır/Bronz */
.logo .d { color: #fadc96; } /* Premium Gold */

.logo-line {
  width: 48px; height: 2px;
  background: linear-gradient(90deg, transparent, #b87333, transparent);
  margin: 8px auto 6px;
}
.logo-sub {
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,0.4);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.main-title {
  font-size: 30px; font-weight: 900; color: #fff;
  text-align: center; margin-bottom: 22px; line-height: 1.2;
}
.main-title em { font-style: normal; color: #b87333; }

.wheel-wrap {
  position: relative;
  width: 300px; height: 300px;
  display: flex; align-items: center;
  justify-content: center;
  margin-bottom: 28px;
}

/* Lüks Dış Çerçeve (Kasa) */
.ring-glow {
  position: absolute; inset: -12px; border-radius: 50%;
  background: conic-gradient(from 0deg, #b87333, #fadc96, #4a2e15, #b87333, #fadc96, #4a2e15, #b87333);
  animation: spinRing 10s linear infinite;
  opacity: 1;
  box-shadow: 0 10px 30px rgba(0,0,0,0.9);
}
.ring-glow-mask { 
  position: absolute; inset: -4px; border-radius: 50%; 
  background: #111;
  box-shadow: inset 0 0 20px rgba(0,0,0,1);
  z-index: 2;
}
@keyframes spinRing { to { transform: rotate(360deg); } }

#spotlight {
  position: absolute;
  inset: 0; border-radius: 50%;
  pointer-events: none; z-index: 10;
  opacity: 0; transition: opacity 0.3s;
}

.pointer {
  position: absolute; top: -15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  filter: drop-shadow(0 5px 8px rgba(0,0,0,0.8));
}
.ptr-ball {
  width: 16px; height: 16px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff 0%, #b87333 100%);
  border: 2px solid rgba(255,255,255,0.6);
  margin-bottom: -2px; z-index: 1;
}
.ptr-tri {
  width: 0; height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 24px solid #fadc96;
}

canvas#wheel {
  border-radius: 50%; position: relative; z-index: 5;
}

.btn-area { position: relative; margin-bottom: 14px; }

/* Premium Buton Parlaması */
.btn-shine {
  position: absolute; inset: -4px; border-radius: 50px;
  background: rgba(211, 84, 0, 0.6);
  filter: blur(15px); opacity: 1;
}

#spinBtn { position: relative; background: none; border: none; cursor: pointer; outline: none; }
.btn-body {
  position: relative;
  background: linear-gradient(180deg, #d35400 0%, #873600 100%);
  color: #fff;
  font-family: inherit; font-size: 22px; font-weight: 900;
  letter-spacing: 5px; text-transform: uppercase;
  border-radius: 50px; padding: 17px 88px;
  border: 1px solid #ffb84d;
  box-shadow: 0 6px 0 #4a1c00, inset 0 2px 5px rgba(255,255,255,0.3);
  transition: transform .12s, box-shadow .12s;
}
#spinBtn:active:not(:disabled) .btn-body { transform: translateY(5px); box-shadow: 0 1px 0 #4a1c00; }
#spinBtn:disabled .btn-body { opacity: 0.4; cursor: not-allowed; }

.invite-btn {
  margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 13px 28px;
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer;
  width: 100%; max-width: 300px;
  transition: background .15s, border-color .15s;
}
.invite-btn:active { background: rgba(255,255,255,0.08); }
.invite-badge {
  background: linear-gradient(135deg, #b87333, #d35400);
  color: #fff; font-size: 11px; font-weight: 800;
  padding: 3px 8px; border-radius: 8px; letter-spacing: .5px;
  white-space: nowrap;
}

.spin-info {
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.4);
  display: flex; align-items: center; gap: 7px;
  text-align: center; margin-top: 10px;
}
.spin-info::before, .spin-info::after {
  content: ''; display: block;
  width: 5px; height: 5px; border-radius: 50%;
  background: #b87333; flex-shrink: 0;
}

.no-spin-banner {
  display: none; margin-top: 18px;
  background: rgba(211,84,0,0.08);
  border: 1px solid rgba(211,84,0,0.2);
  border-radius: 16px; padding: 18px 22px;
  text-align: center; max-width: 300px; width: 100%;
}
.no-spin-banner .ns-icon { font-size: 32px; margin-bottom: 6px; }
.no-spin-banner .ns-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.no-spin-banner .ns-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; margin-bottom: 10px; }

.ns-countdown-wrap { margin-bottom: 12px; }
.ns-countdown-label {
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 4px;
}
.ns-countdown {
  font-size: 22px; font-weight: 900;
  color: #b87333;
  letter-spacing: 3px;
  text-shadow: 0 0 14px rgba(211,84,0,0.4);
  font-variant-numeric: tabular-nums;
}

.no-spin-banner .ns-btn {
  background: linear-gradient(135deg, #d35400, #b87333);
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 900;
  border: none; border-radius: 12px; padding: 12px 28px;
  cursor: pointer; letter-spacing: 0.5px; display: block; width: 100%; margin-bottom: 10px;
}
.no-spin-banner .ns-invite {
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
  font-family: inherit; font-size: 13px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 11px 28px;
  cursor: pointer; display: block; width: 100%;
}

.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.overlay.show { display: flex; }

.rcard {
  width: 88%; max-width: 310px; background: #141414;
  border-radius: 26px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 40px 80px rgba(0,0,0,0.7);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform: scale(0.7) translateY(40px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.rcard-top {
  padding: 30px 24px 22px; text-align: center;
  background: linear-gradient(180deg, rgba(211,84,0,0.12) 0%, transparent 100%);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.rcard-top.lose-top { background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%); }
.rcard-icon {
  width: 76px; height: 76px; border-radius: 22px; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center; font-size: 38px;
}
.rcard-icon.win  { background: rgba(211,84,0,0.12); border: 1px solid rgba(211,84,0,0.25); }
.rcard-icon.lose { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.rcard-title { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 10px; }
.rcard-badge {
  display: inline-block; background: linear-gradient(135deg, #b87333, #d35400);
  color: #fff; font-size: 13px; font-weight: 800;
  padding: 6px 18px; border-radius: 20px; letter-spacing: .5px;
}
.rcard-bot { padding: 20px 24px 26px; text-align: center; }
.rcard-text { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; margin-bottom: 14px; }
.rcard-btn {
  width: 100%; background: linear-gradient(135deg, #d35400, #b87333);
  color: #fff; font-family: inherit; font-size: 16px; font-weight: 900;
  letter-spacing: 1px; text-transform: uppercase; border: none; border-radius: 16px;
  padding: 17px; cursor: pointer; box-shadow: 0 4px 24px rgba(211,84,0,0.45);
  margin-bottom: 10px;
}
.rcard-btn.lose-btn {
  background: linear-gradient(135deg, #1a1a2e, #2a2a4a);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08);
}
.rcard-invite-btn {
  width: 100%; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.75);
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 13px; cursor: pointer;
}

canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
</style>
</head>
<body>
<div class="bg"></div>

<div class="container">
  <div class="logo"><span class="w">betor</span><span class="o">spin</span><span class="d">.</span></div>
  <div class="logo-line"></div>
  <div class="logo-sub">Şans Çarkı</div>
  <div class="main-title">Çevir &amp; <em>Kazan!</em></div>

  <div class="wheel-wrap">
    <div class="ring-glow"></div>
    <div class="ring-glow-mask"></div>
    <div class="pointer"><div class="ptr-ball"></div><div class="ptr-tri"></div></div>
    <canvas id="wheel" width="286" height="286"></canvas>
    <canvas id="spotlight" width="286" height="286"></canvas>
  </div>

  <div class="btn-area">
    <div class="btn-shine"></div>
    <button id="spinBtn" onclick="spin()" disabled>
      <div class="btn-body">ÇEVİR</div>
    </button>
  </div>

  <div class="spin-info" id="spinInfo">Yükleniyor...</div>

  <button class="invite-btn" onclick="shareInvite()">
    👥 Arkadaşını Davet Et
    <span class="invite-badge">+1 Spin</span>
  </button>

  <div class="no-spin-banner" id="noSpinBanner">
    <div class="ns-icon">⏳</div>
    <div class="ns-title">Bugünkü Hakkını Kullandın!</div>
    <div class="ns-text">Yeni spin hakkın için kalan süre:</div>
    <div class="ns-countdown-wrap">
      <div class="ns-countdown-label">Yenileniyor</div>
      <div class="ns-countdown" id="nsCountdown">00:00:00</div>
    </div>
    <button class="ns-btn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
    <button class="ns-invite" onclick="shareInvite()">👥 Davet Et → Hemen +1 Spin Kazan</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="rcard">
    <div class="rcard-top" id="rTop">
      <div class="rcard-icon win" id="rIcon"><span id="rEmoji">🎉</span></div>
      <div class="rcard-title" id="rTitle">Tebrikler!</div>
      <div class="rcard-badge" id="rBadge">100 Freespin</div>
    </div>
    <div class="rcard-bot">
      <div class="rcard-text" id="rText">Ödülün hesabına yatırıldı!</div>
      <button class="rcard-btn" id="rBtn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
      <button class="rcard-invite-btn" id="rInviteBtn" onclick="shareInvite()">👥 Arkadaşını Davet Et → +1 Spin</button>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#050608'); tg.setBackgroundColor('#050608'); }

const urlParams = new URLSearchParams(window.location.search);
const USER_ID = parseInt(urlParams.get('user_id')) || tg?.initDataUnsafe?.user?.id || null;
const USER_NAME = tg?.initDataUnsafe?.user?.first_name || '';
const USER_USERNAME = tg?.initDataUnsafe?.user?.username || '';

// ── Lüks Premium Çark Renkleri ────────────────────────────────────────────────────
const SEGS = [
  { lines:['100','FREESPIN'],         bg:'#122b4a', stroke:'#b87333', tc:'#fadc96', icon:'🎰', win:true,  prize:'100 Freespin'          },
  { lines:['ÖZEL YATIRIM','BONUSU'], bg:'#4a1f00', stroke:'#b87333', tc:'#fadc96', icon:'💰', win:true,  prize:'Özel Yatırım Bonusu'   },
  { lines:['100₺','BAKİYE'],         bg:'#0f4224', stroke:'#b87333', tc:'#fadc96', icon:'💵', win:true,  prize:'100₺ Bakiye'            },
  { lines:['VİP','HEDİYE'],          bg:'#3a1a45', stroke:'#b87333', tc:'#fadc96', icon:'👑', win:true,  prize:'VİP Hediye'            },
  { lines:['KAYBETTİN',''],          bg:'#1a1a1a', stroke:'#b87333', tc:'#fadc96', icon:'😐', win:false, prize:null                    },
  { lines:['100₺','BONUS BUY'],      bg:'#a84800', stroke:'#b87333', tc:'#fadc96', icon:'🎁', win:true,  prize:'100₺ Bonus Buy'        },
  { lines:['200','FREESPIN'],         bg:'#122b4a', stroke:'#b87333', tc:'#fadc96', icon:'🎰', win:true,  prize:'200 Freespin'          },
  { lines:['KAYBETTİN',''],          bg:'#1a1a1a', stroke:'#b87333', tc:'#fadc96', icon:'😐', win:false, prize:null                    },
  { lines:['200₺','BONUS BUY'],      bg:'#a84800', stroke:'#b87333', tc:'#fadc96', icon:'🎁', win:true,  prize:'200₺ Bonus Buy'        },
  { lines:['KAYBETTİN',''],          bg:'#1a1a1a', stroke:'#b87333', tc:'#fadc96', icon:'😐', win:false, prize:null                    },
];

const N=SEGS.length, ARC=(2*Math.PI)/N;
const cv=document.getElementById('wheel'), ctx=cv.getContext('2d');
const sc=document.getElementById('spotlight'), sctx=sc.getContext('2d');
const CX=143, CY=143, R=138;
let angle=0, spinning=false, spinAllowed=false;
let countdownInterval=null;

function getSpinKey(){ return `last_spin_${USER_ID || 'guest'}`; }

function updateCountdown() {
  const el = document.getElementById('nsCountdown');
  if (!el) return;
  const lastSpin = localStorage.getItem(getSpinKey());
  let target;
  if (lastSpin) {
    target = new Date(parseInt(lastSpin) + 24 * 60 * 60 * 1000);
  } else {
    target = new Date();
    target.setUTCHours(24, 0, 0, 0);
  }
  const diff = target - new Date();
  if (diff <= 0) { clearInterval(countdownInterval); countdownInterval = null; checkSpinRight(); return; }
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  el.textContent = `${h}:${m}:${s}`;
}
function startCountdown() {
  updateCountdown();
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(updateCountdown, 1000);
}
function stopCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function draw(a) {
  ctx.clearRect(0,0,286,286);
  for(let i=0;i<N;i++){
    const s=a+i*ARC, e=s+ARC, seg=SEGS[i];
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.fillStyle=seg.bg; ctx.fill();
    ctx.strokeStyle=seg.stroke; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(CX,CY);
    ctx.rotate(s+ARC/2); ctx.textAlign='right';
    const ls=seg.lines.filter(l=>l), fs=ls.length>1?9:11;
    ctx.font=`900 ${fs}px -apple-system,Arial,sans-serif`;
    ctx.fillStyle=seg.tc;
    const lh=fs+4, oy=-(ls.length-1)*lh/2;
    ls.forEach((l,li)=>ctx.fillText(l,R-9,oy+li*lh+fs*0.35));
    ctx.restore();
  }
  for(let i=0;i<N;i++){
    const a2=a+i*ARC;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(CX+R*Math.cos(a2),CY+R*Math.sin(a2));
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.stroke();
  }
  
  // Merkez Göbek (Lüks Altın/Bronz)
  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle='#b87333'; ctx.lineWidth=3; ctx.stroke();
  
  ctx.beginPath(); ctx.arc(CX,CY,R-5,0,2*Math.PI);
  ctx.strokeStyle='rgba(184,115,51,0.15)'; ctx.lineWidth=8; ctx.stroke();
  
  const hg=ctx.createRadialGradient(CX-8,CY-8,2,CX,CY,34);
  hg.addColorStop(0,'#3a3a3a'); hg.addColorStop(.5,'#1a1a1a'); hg.addColorStop(1,'#0d0d0d');
  
  ctx.beginPath(); ctx.arc(CX,CY,34,0,2*Math.PI);
  ctx.fillStyle=hg; ctx.fill();
  ctx.strokeStyle='#b87333'; ctx.lineWidth=2.5; ctx.stroke();
  
  ctx.beginPath(); ctx.arc(CX,CY,26,0,2*Math.PI);
  ctx.strokeStyle='rgba(184,115,51,0.2)'; ctx.lineWidth=1; ctx.stroke();
  
  ctx.textAlign='center'; ctx.font='800 8px -apple-system,Arial,sans-serif';
  ctx.fillStyle='#fadc96'; ctx.fillText('betor',CX,CY-2);
  ctx.fillStyle='#fff'; ctx.fillText('spin.',CX,CY+9);
}
draw(angle);

function drawSpotlight(a, idx, alpha) {
  sctx.clearRect(0,0,286,286);
  if(alpha<=0) return;
  sctx.save();
  sctx.fillStyle=`rgba(0,0,0,${alpha*0.72})`;
  sctx.beginPath(); sctx.arc(CX,CY,R,0,2*Math.PI); sctx.fill();
  const s=a+idx*ARC, e=s+ARC;
  sctx.globalCompositeOperation='destination-out';
  sctx.beginPath(); sctx.moveTo(CX,CY); sctx.arc(CX,CY,R,s,e); sctx.closePath();
  sctx.fillStyle=`rgba(255,255,255,${alpha})`; sctx.fill();
  sctx.restore();
  
  sctx.save(); sctx.globalAlpha=alpha*0.9;
  const seg=SEGS[idx], mid=s+ARC/2;
  const grd=sctx.createRadialGradient(CX+(R*0.6)*Math.cos(mid),CY+(R*0.6)*Math.sin(mid),2,CX+(R*0.6)*Math.cos(mid),CY+(R*0.6)*Math.sin(mid),R*0.5);
  grd.addColorStop(0,seg.tc+'aa'); grd.addColorStop(1,'transparent');
  sctx.beginPath(); sctx.moveTo(CX,CY); sctx.arc(CX,CY,R,s,e); sctx.closePath();
  sctx.fillStyle=grd; sctx.globalCompositeOperation='source-over'; sctx.fill();
  sctx.restore();
}

function animateSpotlight(a,idx){
  sc.style.opacity='1';
  let alpha=0,t0=null;
  function frame(ts){
    if(!t0)t0=ts; alpha=Math.min((ts-t0)/600,1);
    drawSpotlight(a,idx,alpha);
    if(alpha<1)requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function clearSpotlight(){
  sc.style.opacity='0'; sctx.clearRect(0,0,286,286);
}

async function checkSpinRight() {
  if(!USER_ID){ enableSpin(); return; }
  try {
    const res = await fetch(`/api/check_spin?user_id=${USER_ID}`);
    const data = await res.json();
    if(data.allowed) enableSpin(data.spins);
    else disableSpin();
  } catch(e) { enableSpin(); }
}

function enableSpin(spins) {
  spinAllowed = true;
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('spinInfo').style.display = 'flex';
  document.getElementById('noSpinBanner').style.display = 'none';
  document.getElementById('spinInfo').innerHTML = spins ? `Bugün <b>${spins}</b> spin hakkın var!` : 'Çevirme hakkın var!';
  stopCountdown();
}

function disableSpin() {
  spinAllowed = false;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinInfo').style.display = 'none';
  document.getElementById('noSpinBanner').style.display = 'block';
  startCountdown();
}

function spin() {
  if(spinning || !spinAllowed) return;
  spinning=true; document.getElementById('spinBtn').disabled=true; clearSpotlight();
  playSpinStart();
  const dur=4000, tSpin=5+Math.random()*2, tAng=angle+tSpin*Math.PI*2, st=performance.now();
  function step(now){
    const p=Math.min((now-st)/dur,1), eOut=1-Math.pow(1-p,4);
    angle=angle+(tAng-angle)*eOut; draw(angle);
    if(p<1) requestAnimationFrame(step);
    else {
      spinning=false; angle=angle%(2*Math.PI); const f=angle; let winIdx=0;
      for(let i=0;i<N;i++){ const s=(f+i*ARC)%(2*Math.PI), e=(s+ARC)%(2*Math.PI); if(s>e ? (1.5*Math.PI>=s || 1.5*Math.PI<e) : (1.5*Math.PI>=s && 1.5*Math.PI<e)){ winIdx=i; break; } }
      showResult(winIdx);
      if(USER_ID) { localStorage.setItem(getSpinKey(), Date.now().toString()); }
    }
  }
  requestAnimationFrame(step);
}

function showResult(idx) {
  const seg=SEGS[idx];
  animateSpotlight(angle,idx);
  document.getElementById('rIcon').className = `rcard-icon ${seg.win?'win':'lose'}`;
  document.getElementById('rEmoji').textContent = seg.icon;
  document.getElementById('rTop').className = `rcard-top ${seg.win?'':'lose-top'}`;
  
  if(seg.win){
    document.getElementById('rTitle').textContent='Tebrikler!';
    document.getElementById('rBadge').style.display='inline-block';
    document.getElementById('rBadge').textContent=seg.prize;
    document.getElementById('rText').textContent='Ödülün hesabına yatırıldı!';
    document.getElementById('rBtn').className='rcard-btn';
    document.getElementById('rBtn').textContent='SİTEYE GİT VE OYNA';
    document.getElementById('rInviteBtn').style.display='none';
    playWin(); setTimeout(confetti,100);
    if(tg) tg.sendData(JSON.stringify({event:'spin_result',prize:seg.prize,win:true}));
  } else {
    document.getElementById('rTitle').textContent='Bu Sefer Olmadı 😔';
    document.getElementById('rBadge').style.display='none';
    document.getElementById('rText').textContent='Üzülme! Arkadaşını davet et, +1 Spin kazan 🎡';
    document.getElementById('rBtn').className='rcard-btn lose-btn';
    document.getElementById('rBtn').textContent='SİTEYE GİT VE OYNA';
    document.getElementById('rInviteBtn').style.display='block';
    playLose();
    if(tg) tg.sendData(JSON.stringify({event:'spin_result',prize:null,win:false}));
  }
  setTimeout(()=>document.getElementById('overlay').classList.add('show'), 800);
  setTimeout(()=>{ if(!spinAllowed) disableSpin(); }, 1000);
}

}

function confetti(){
  const cc=document.getElementById('confetti'); cc.width=window.innerWidth; cc.height=window.innerHeight;
  const cx2=cc.getContext('2d');
  const cols=['#ff4500','#ff8c00','#ffc200','#ffffff','#ff6b6b','#4a8fff','#22ee66'];
  const ps=Array.from({length:110},()=>({ x:Math.random()*cc.width, y:-20-Math.random()*80, w:5+Math.random()*8, h:3+Math.random()*4, c:cols[Math.floor(Math.random()*cols.length)], vy:2+Math.random()*4, vx:-2+Math.random()*4, r:Math.random()*360, vr:-5+Math.random()*10 }));
  function drawC(){
    cx2.clearRect(0,0,cc.width,cc.height); let act=false;
    ps.forEach(p=>{
      if(p.y<cc.height){
        act=true; p.y+=p.vy; p.x+=p.vx; p.r+=p.vr;
        cx2.save(); cx2.translate(p.x,p.y); cx2.rotate(p.r*Math.PI/180); cx2.fillStyle=p.c; cx2.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx2.restore();
      }
    });
    if(act) requestAnimationFrame(drawC); else cx2.clearRect(0,0,cc.width,cc.height);
  }
  drawC();
}

// Ses ve Titreşim (Değiştirilmedi)
function getACtx(){ window.aCtx=window.aCtx||new (window.AudioContext||window.webkitAudioContext)(); if(window.aCtx.state==='suspended')window.aCtx.resume(); return window.aCtx; }
function vibrate(p){ if(navigator.vibrate)navigator.vibrate(p); else if(tg&&tg.HapticFeedback)tg.HapticFeedback.impactOccurred('medium'); }
function playWin(){
  try{
    const a=getACtx(),notes=[440,554,659,880];
    notes.forEach((freq,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g); g.connect(a.destination); o.type='triangle';
      const t=a.currentTime+i*0.13;
      o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.25);
    });
    vibrate([50,30,80,30,150]);
  }catch(e){}
}
function playLose(){
  try{
    const a=getACtx(),notes=[300,220];
    notes.forEach((freq,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g); g.connect(a.destination); o.type='sawtooth';
      const t=a.currentTime+i*0.18;
      o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t); o.stop(t+0.3);
    });
    vibrate([100,50,100]);
  }catch(e){}
}
function playSpinStart(){
  try{
    const a=getACtx(),o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type='sine';
    o.frequency.setValueAtTime(800,a.currentTime); o.frequency.exponentialRampToValueAtTime(300,a.currentTime+0.5);
    g.gain.setValueAtTime(0.1,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);
    o.start(); o.stop(a.currentTime+0.5);
    vibrate(30);
  }catch(e){}
}

document.addEventListener('DOMContentLoaded', ()=>checkSpinRight());
