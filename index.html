<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Şans Çarkı - Betorspin Elite Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rajdhani', -apple-system, sans-serif;
  background: #0a0a0a;
  min-height: 100vh;
  overflow-x: hidden; /* Sadece yatay kaymayı kapat, dikey serbest */
  color: #fff;
}

.bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(255,69,0,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(255,120,0,0.08) 0%, transparent 50%),
    #0a0a0a;
  z-index: 0;
}

.container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  padding: 28px 16px 60px; /* Alt boşluğu artırdım */
}

/* Yumuşak Giriş Animasyonu */
@keyframes wheelIntro {
  0% { transform: scale(0.9); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.wheel-wrap {
  position: relative;
  width: 300px; height: 300px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
  animation: wheelIntro 0.8s ease-out forwards;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.wheel-wrap.spinning {
  transform: scale(1.05);
}

.ring-glow {
  position: absolute; inset: -12px; border-radius: 50%;
  background: conic-gradient(#ff4500, #ff8c00, #ffc200, #ff8c00, #ff4500, #cc2200, #ff4500);
  animation: spinRing 8s linear infinite;
  opacity: 0.6;
}
.ring-glow-mask { position: absolute; inset: -6px; border-radius: 50%; background: #0a0a0a; }
@keyframes spinRing { to { transform: rotate(360deg); } }

.pointer {
  position: absolute; top: -10px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  filter: drop-shadow(0 4px 10px rgba(255,69,0,0.8));
}
.ptr-ball {
  width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff 0%, #ff8c00 100%);
  border: 2px solid rgba(255,255,255,0.8);
  margin-bottom: -2px; z-index: 1;
}
.ptr-tri {
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 24px solid #ff4500;
}

canvas#wheel {
  border-radius: 50%; position: relative; z-index: 5;
  box-shadow: 0 0 0 4px #111, 0 0 0 7px rgba(255,69,0,0.2), 0 25px 50px rgba(0,0,0,0.9);
}

.btn-area { position: relative; margin-bottom: 16px; width: 100%; max-width: 300px; }
.btn-shine {
  position: absolute; inset: -5px; border-radius: 50px;
  background: linear-gradient(90deg, #ff4500, #ff8c00, #ffc200, #ff8c00, #ff4500);
  background-size: 300% auto;
  animation: shine 3s linear infinite;
  filter: blur(10px); opacity: 0.6;
}
@keyframes shine { to { background-position: 300% center; } }

#spinBtn { position: relative; width: 100%; background: none; border: none; cursor: pointer; outline: none; }
.btn-body {
  position: relative;
  background: linear-gradient(180deg, #ff5500 0%, #cc2200 45%, #991500 100%);
  color: #fff;
  font-family: inherit; font-size: 24px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  border-radius: 50px; padding: 18px 0;
  border: 1px solid rgba(255,150,50,0.3);
  box-shadow: 0 8px 0 #5a0800, inset 0 1px 0 rgba(255,255,255,0.2);
  transition: transform 0.1s, box-shadow 0.1s;
}
#spinBtn:active:not(:disabled) .btn-body { transform: translateY(6px); box-shadow: 0 2px 0 #5a0800; }
#spinBtn:disabled .btn-body { opacity: 0.4; cursor: not-allowed; }

.invite-btn {
  margin-top: 16px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 14px 28px;
  color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
  cursor: pointer; width: 100%; max-width: 300px;
}
.invite-badge {
  background: linear-gradient(135deg, #ff4500, #ff8c00);
  color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 8px;
}

.spin-info {
  font-size: 14px; font-weight: 600;
  color: rgba(255,255,255,0.5);
  display: flex; align-items: center; gap: 8px;
  text-align: center; margin-top: 12px;
  text-transform: uppercase; letter-spacing: 1px;
}
.spin-info::before, .spin-info::after {
  content: ''; display: block;
  width: 6px; height: 6px; border-radius: 50%;
  background: #ff4500;
}

.no-spin-banner {
  display: none;
  margin-top: 20px;
  background: rgba(255,69,0,0.1);
  border: 1px solid rgba(255,69,0,0.2);
  border-radius: 20px;
  padding: 22px;
  text-align: center;
  max-width: 320px;
  width: 100%;
}
.ns-countdown {
  font-size: 26px; font-weight: 700;
  color: #ff4500;
  letter-spacing: 4px;
  font-variant-numeric: tabular-nums;
}

.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
}
.overlay.show { display: flex; }

.rcard {
  width: 90%; max-width: 340px;
  background: #111;
  border-radius: 32px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 50px 100px rgba(0,0,0,0.8);
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  from { transform: scale(0.7) translateY(40px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.rcard-top {
  padding: 40px 24px 30px; text-align: center;
  background: linear-gradient(180deg, rgba(255,69,0,0.15) 0%, transparent 100%);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.rcard-title { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 15px; text-transform: uppercase; }
.rcard-badge {
  display: inline-block;
  background: linear-gradient(135deg, #ff4500, #ff8c00);
  color: #fff; font-size: 18px; font-weight: 700;
  padding: 10px 28px; border-radius: 50px;
  box-shadow: 0 10px 25px rgba(255,69,0,0.4);
}
.rcard-bot { padding: 30px 28px 35px; text-align: center; }
.rcard-btn {
  width: 100%;
  background: linear-gradient(135deg, #ff4500, #ff6a00);
  color: #fff; font-family: inherit; font-size: 18px; font-weight: 700;
  border: none; border-radius: 18px; padding: 20px;
  cursor: pointer; box-shadow: 0 15px 35px rgba(255,69,0,0.5);
  text-transform: uppercase; letter-spacing: 1px;
}

#adminBadge {
  position: fixed; top: 12px; right: 12px;
  background: rgba(255,69,0,0.2);
  border: 1px solid #ff4500;
  padding: 5px 12px; border-radius: 8px;
  font-size: 11px; font-weight: 700; color: #ff4500;
  z-index: 100; display: none;
}

.logo { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; text-transform: uppercase; }
.logo .w { color: #fff; }
.logo .o { color: #ff4500; }
.logo .d { color: #ff8c00; }
.logo-line { width: 60px; height: 3px; background: linear-gradient(90deg, transparent, #ff4500, transparent); margin: 8px auto 6px; }
.logo-sub { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 22px; }
.main-title { font-size: 34px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 22px; line-height: 1; text-transform: uppercase; }
.main-title em { font-style: normal; color: #ff4500; }
</style>
</head>
<body>
<div class="bg"></div>
<div id="adminBadge">ADMIN MODE</div>

<div class="container">
  <div class="logo"><span class="w">betor</span><span class="o">spin</span><span class="d">.</span></div>
  <div class="logo-line"></div>
  <div class="logo-sub">Şans Çarkı</div>
  <div class="main-title">Çevir &amp; <em>Kazan!</em></div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="ring-glow"></div>
    <div class="ring-glow-mask"></div>
    <div class="pointer"><div class="ptr-ball"></div><div class="ptr-tri"></div></div>
    <canvas id="wheel" width="286" height="286"></canvas>
  </div>

  <div class="btn-area">
    <div class="btn-shine"></div>
    <button id="spinBtn" onclick="spin()">
      <div class="btn-body">ÇEVİR</div>
    </button>
  </div>

  <div class="spin-info" id="spinInfo">Yükleniyor...</div>

  <button class="invite-btn" onclick="shareInvite()">
    Arkadaşını Davet Et
    <span class="invite-badge">+1 Spin</span>
  </button>

  <div class="no-spin-banner" id="noSpinBanner">
    <div class="ns-title" style="font-weight:700; margin-bottom:10px; color:rgba(255,255,255,0.6);">BUGÜNKÜ HAKKIN BİTTİ</div>
    <div class="ns-countdown" id="nsCountdown">00:00:00</div>
    <button class="rcard-btn" style="margin-top:20px;" onclick="goSite()">SİTEYE GİT VE OYNA</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="rcard">
    <div class="rcard-top" id="rTop">
      <div class="rcard-title" id="rTitle">TEBRİKLER!</div>
      <div id="rBadge" class="rcard-badge">ÖDÜL</div>
    </div>
    <div class="rcard-bot">
      <div id="rText" style="color:rgba(255,255,255,0.5); margin-bottom:25px; font-size:15px; font-weight:500;">Ödülün hesabına tanımlandı!</div>
      <button class="rcard-btn" id="rBtn" onclick="goSite()">SİTEYE GİT VE OYNA</button>
      <button onclick="closeOverlay()" style="background:none; border:none; color:rgba(255,255,255,0.3); margin-top:15px; font-weight:600; cursor:pointer;">KAPAT</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
const ADMIN_IDS = ["243111766253", 243111766253]; 
const USER_ID = tg?.initDataUnsafe?.user?.id || 'guest';

if (tg) { tg.ready(); tg.expand(); }

const checkIsAdmin = () => ADMIN_IDS.includes(USER_ID) || ADMIN_IDS.includes(String(USER_ID));
if (checkIsAdmin()) document.getElementById('adminBadge').style.display = 'block';

// ── SES VE TİTREŞİM ──────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx() { if (!actx) actx = new AudioCtx(); return actx; }
function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); }

function playTick() {
  try {
    const a = getACtx();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(500, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(150, a.currentTime + 0.07);
    g.gain.setValueAtTime(0.15, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.07);
    o.start(); o.stop(a.currentTime + 0.07);
  } catch (e) {}
}

function playWin() {
  try {
    const a = getACtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'triangle';
      const t = a.currentTime + i * 0.12;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
    vibrate([50, 30, 80, 30, 150]);
  } catch (e) {}
}

function playLose() {
  try {
    const a = getACtx();
    [300, 220].forEach((freq, i) => {
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'sawtooth';
      const t = a.currentTime + i * 0.2;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
    vibrate([100, 50, 100]);
  } catch (e) {}
}

// ── Çark dilimleri ────────────────────────────────────────────────────
const SEGS = [
  { lines:['KAYBETTİN'],         bg:'#0a0a0a', stroke:'#222', tc:'#666', win:false, prize:null },
  { lines:['200','BONUS BUY'],   bg:'#2a0a0a', stroke:'#4a1a1a', tc:'#ff6666', win:true, prize:'200 Bonus Buy' },
  { lines:['+1','SPIN'],         bg:'#1a1a1a', stroke:'#ff8c00', tc:'#ffffff', win:true, prize:'+1 Spin', extra:true },
  { lines:['100','FREESPIN'],    bg:'#0a1a3a', stroke:'#1a2a4a', tc:'#77b5ff', win:true, prize:'100 Freespin' },
  { lines:['ÖZEL YATIRIM','BONUSU'], bg:'#2a1a00', stroke:'#4a2a1a', tc:'#ffcc66', win:true, prize:'Yatırım Bonusu' },
  { lines:['100₺','BAKİYE'],     bg:'#0a2a10', stroke:'#1a4a1a', tc:'#66ff99', win:true, prize:'100₺ Bakiye' },
  { lines:['VIP','GIFT'],        bg:'#220a30', stroke:'#4a1a5a', tc:'#ee99ff', win:true, prize:'VIP Gift' },
  { lines:['KAYBETTİN'],         bg:'#0a0a0a', stroke:'#222', tc:'#666', win:false, prize:null },
  { lines:['200','BONUS BUY'],   bg:'#0a1a3a', stroke:'#1a2a4a', tc:'#77b5ff', win:true, prize:'200 Bonus Buy' },
  { lines:['100','FREESPIN'],    bg:'#2a1a00', stroke:'#4a2a1a', tc:'#ffcc66', win:true, prize:'100 Freespin' },
];

const N=SEGS.length, ARC=(2*Math.PI)/N;
const cv=document.getElementById('wheel'), ctx=cv.getContext('2d');
const CX=143, CY=143, R=138;
let angle=0, spinning=false, spinAllowed=true;

function draw(a) {
  ctx.clearRect(0,0,286,286);
  for(let i=0;i<N;i++){
    const s=a+i*ARC, e=s+ARC, seg=SEGS[i];
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.fillStyle=seg.bg; ctx.fill();
    ctx.strokeStyle=seg.stroke; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(CX,CY); ctx.rotate(s+ARC/2); ctx.textAlign='right';
    const ls=seg.lines, fs=ls.length>1?10:12;
    ctx.font=`700 ${fs}px Rajdhani`;
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 5;
    ctx.fillStyle=seg.tc;
    const lh=fs+4, oy=-(ls.length-1)*lh/2;
    ls.forEach((l,li)=>ctx.fillText(l,R-12,oy+li*lh+fs*0.35));
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(CX,CY,34,0,2*Math.PI);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.strokeStyle='#ff4500'; ctx.lineWidth=2; ctx.stroke();
  ctx.textAlign='center'; ctx.font='700 9px Rajdhani';
  ctx.fillStyle='#ff4500'; ctx.fillText('BETOR',CX,CY-2);
  ctx.fillStyle='#fff'; ctx.fillText('SPIN.',CX,CY+8);
}

function checkSpinRight() {
  if (checkIsAdmin()) {
    spinAllowed = true;
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('spinInfo').textContent = 'Sınırsız Hak (Admin)';
    document.getElementById('noSpinBanner').style.display = 'none';
    return;
  }
  const lastSpin = localStorage.getItem(`last_spin_${USER_ID}`);
  if (lastSpin) {
    const diff = Date.now() - parseInt(lastSpin);
    if (diff < 24 * 60 * 60 * 1000) {
      spinAllowed = false;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('noSpinBanner').style.display = 'block';
      document.getElementById('spinInfo').textContent = 'Hakkın Bitti';
      return;
    }
  }
  spinAllowed = true;
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('spinInfo').textContent = '1 Çevirme Hakkın Var';
}

function spin() {
  if(spinning||!spinAllowed) return;
  spinning=true; spinAllowed=false;
  
  const wrap = document.getElementById('wheelWrap');
  wrap.classList.add('spinning');
  
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinInfo').textContent='BOL ŞANS!';
  getACtx().resume();

  const total=(12+Math.random()*6)*2*Math.PI;
  const dur=6000, start=angle; let t0=null, lastTick = start;
  
  function frame(ts){
    if(!t0) t0=ts;
    const prog=Math.min((ts-t0)/dur,1);
    angle=start+total*(1-Math.pow(1-prog,5));
    
    if (Math.abs(angle - lastTick) >= (2 * Math.PI / 18)) {
      lastTick = angle;
      playTick();
      vibrate(6);
    }

    draw(angle);
    if(prog<1) requestAnimationFrame(frame);
    else { 
      spinning=false; 
      wrap.classList.remove('spinning');
      const norm=((-Math.PI/2-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      const idx=Math.floor(norm/ARC)%N;
      showResult(SEGS[idx]);
    }
  }
  requestAnimationFrame(frame);
}

function showResult(res) {
  const overlay = document.getElementById('overlay');
  if (res.extra) {
    document.getElementById('rTitle').textContent = 'HARİKA!';
    document.getElementById('rBadge').textContent = '+1 SPIN';
    document.getElementById('rText').textContent = 'Bir hak daha kazandın, tekrar çevir!';
    spinAllowed = true;
    playWin();
  } else {
    if (!checkIsAdmin()) localStorage.setItem(`last_spin_${USER_ID}`, Date.now().toString());
    if (res.win) {
      document.getElementById('rTitle').textContent = 'TEBRİKLER!';
      document.getElementById('rBadge').textContent = res.prize;
      document.getElementById('rText').textContent = 'Ödülün hesabına tanımlandı!';
      playWin();
    } else {
      document.getElementById('rTitle').textContent = 'OLMADI';
      document.getElementById('rBadge').textContent = 'KAYIP';
      document.getElementById('rText').textContent = 'Yarın tekrar dene veya davet et!';
      playLose();
    }
  }
  overlay.classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  checkSpinRight();
}

function shareInvite() {
  const link = `https://t.me/PrimeXBos_bot?start=ref_${USER_ID}`;
  if(tg) tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Betorspin Şans Çarkını dene!`);
  else { navigator.clipboard.writeText(link); alert('Link kopyalandı!'); }
}

function goSite(){
  if(tg) tg.openLink('https://cutt.ly/7tF5Ow3K');
  else window.open('https://cutt.ly/7tF5Ow3K','_blank');
}

setInterval(() => {
  if (checkIsAdmin()) return;
  const lastSpin = localStorage.getItem(`last_spin_${USER_ID}`);
  if (lastSpin) {
    const diff = (parseInt(lastSpin) + 24 * 60 * 60 * 1000) - Date.now();
    if (diff <= 0) {
      document.getElementById('noSpinBanner').style.display = 'none';
      checkSpinRight();
    } else {
      const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
      const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
      document.getElementById('nsCountdown').textContent = `${h}:${m}:${s}`;
    }
  }
}, 1000);

checkSpinRight();
draw(0);
</script>
</body>
</html>
